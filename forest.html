<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>林 Link</title>
<link rel="icon" type="image/png" href="images/lin-watermark-green.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #060c06;
  font-family: 'Noto Serif SC', serif;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* 顶部标题 */
.title {
  position: fixed;
  top: 52px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 10;
}
.title-main {
  font-size: 38px;
  letter-spacing: 12px;
  color: rgba(255,255,255,0.82);
  font-weight: 300;
  font-family: 'Noto Serif SC', serif;
}
.title-sub {
  font-size: 11px;
  letter-spacing: 7px;
  color: rgba(255,255,255,0.28);
  margin-top: 10px;
  font-family: sans-serif;
  font-weight: 300;
}

/* 入口标签 */
.entry-label {
  position: fixed;
  pointer-events: auto;
  cursor: pointer;
  text-align: center;
  z-index: 10;
  transition: opacity 0.35s;
  opacity: 0.9;
}
.entry-label:hover { opacity: 1; }
.entry-label:hover .entry-name { color: rgba(255,255,255,0.95); }
.entry-label:hover .entry-stem { background: rgba(255,255,255,0.35); }

/* 竖线茎 */
.entry-stem {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.15);
  margin: 0 auto 12px;
  transition: background 0.3s;
}

.entry-name {
  font-size: 15px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  transition: color 0.3s;
}
.entry-desc {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  margin-top: 6px;
  white-space: nowrap;
  font-family: sans-serif;
}

/* 主要入口（今日对话 + 新的连接）权重更高 */
.entry-primary .entry-stem {
  height: 40px;
  background: rgba(255,248,235,0.4);
}
.entry-primary .entry-name {
  font-size: 18px;
  letter-spacing: 4px;
  color: rgba(255,248,225,0.95);
  font-weight: 400;
}
.entry-primary .entry-desc {
  font-size: 12px;
  letter-spacing: 2px;
  color: rgba(255,240,200,0.45);
}
.entry-primary:hover .entry-stem { background: rgba(255,248,235,0.7); }
.entry-primary:hover .entry-name { color: #fff; }

/* 底部提示 */
.hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.12);
  pointer-events: none;
  font-family: sans-serif;
  z-index: 10;
}

/* 手机端：竖排列表布局 */
@media (max-width: 640px) {
  .entry-label {
    position: static !important;
    transform: none !important;
    left: auto !important; top: auto !important;
    bottom: auto !important; right: auto !important;
    opacity: 1;
    display: flex;
    align-items: center;
    padding: 15px 28px;
    border-top: 1px solid rgba(255,255,255,0.05);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
  }
  .entry-label:active { background: rgba(255,255,255,0.04); }

  /* 竖线改为横向左侧竖线 */
  .entry-stem {
    width: 1px !important;
    height: 32px !important;
    margin: 0 20px 0 0 !important;
    flex-shrink: 0;
    background: rgba(255,255,255,0.15) !important;
  }
  .entry-primary .entry-stem {
    height: 40px !important;
    background: rgba(255,248,200,0.4) !important;
  }

  .entry-name {
    font-size: 15px;
    letter-spacing: 3px;
    white-space: normal;
    color: rgba(255,255,255,0.72);
  }
  .entry-primary .entry-name {
    font-size: 16px;
    color: rgba(255,248,220,0.92);
  }
  .entry-desc {
    font-size: 11px;
    white-space: normal;
    margin-top: 4px;
    color: rgba(255,255,255,0.26);
  }

  /* 入口容器：固定在屏幕中下方 */
  #mobile-entries {
    position: fixed;
    bottom: 80px;
    left: 0;
    right: 0;
    z-index: 20;
    display: block;
  }

  /* 标题下移 */
  .title {
    top: 30% !important;
  }
  .title-main { font-size: 80px !important; }

  /* 顶部小字 */
  .hint {
    bottom: auto !important;
    top: 14% !important;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.1) !important;
    pointer-events: none;
  }
}
</style>
</head>
<body>

<canvas id="forest"></canvas>

<!-- 返回入口 -->
<a href="https://www.zenfit.art/lin.html" style="position:fixed;top:28px;left:24px;z-index:50;font-size:11px;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,0.32);text-decoration:none;transition:color 0.3s;" onmouseover="this.style.color='rgba(255,255,255,0.78)'" onmouseout="this.style.color='rgba(255,255,255,0.32)'">← zenfix</a>

<div class="title">
  <div class="title-main">林</div>
  <div class="title-sub">L I N K</div>
</div>

<!-- 入口容器（手机端用网格，桌面端用绝对定位） -->
<div id="mobile-entries">
<div class="entry-label entry-new entry-primary" onclick="window.location.href='index.html'">
  <div class="entry-stem"></div>
  <div class="entry-name">新的连接</div>
  <div class="entry-desc">开始频率测试</div>
</div>

<!-- 入口2：关系档案 -->
<div class="entry-label entry-archive" onclick="window.location.href='archive.html'">
  <div class="entry-stem"></div>
  <div class="entry-name">已有的树</div>
  <div class="entry-desc">重测 · 看变化</div>
</div>

<!-- 入口3：今日卡牌 -->
<div class="entry-label entry-card entry-primary" onclick="window.location.href='card.html'">
  <div class="entry-stem"></div>
  <div class="entry-name">今日对话</div>
  <div class="entry-desc">抽一张卡</div>
</div>

<!-- 入口4：和自己 -->
<div class="entry-label entry-map" onclick="window.location.href='self.html'">
  <div class="entry-stem"></div>
  <div class="entry-name">和自己</div>
  <div class="entry-desc">抽卡记录 · 内心轨迹</div>
</div>
</div>

<div class="hint">走进去，而不是点击进去</div>

<script>
const canvas = document.getElementById('forest');
const ctx = canvas.getContext('2d');

let W, H, trees = [], particles = [], t = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initForest();
  positionEntries();
}

// 把入口标签定位到对应树的树顶上方
function positionEntries() {
  // 手机端用CSS网格，不需要JS定位
  if (window.innerWidth <= 640) return;

  const anchors = [
    { el: '.entry-new',     tx: 0.20, ty: 1.0 - 0.62, offsetY: -48 },
    { el: '.entry-map',     tx: 0.82, ty: 1.0 - 0.68, offsetY: -48 },
    { el: '.entry-card',    tx: 0.50, ty: 0.78 - 0.32, offsetY: -48 },
    { el: '.entry-archive', tx: 0.35, ty: 0.80 - 0.30, offsetY: -48 },
  ];
  anchors.forEach(({ el, tx, ty, offsetY }) => {
    const node = document.querySelector(el);
    if (!node) return;
    const px = tx * W;
    const py = ty * H + offsetY;
    node.style.left = px + 'px';
    node.style.top  = py + 'px';
    node.style.transform = 'translateX(-50%)';
    node.style.bottom = 'auto';
    node.style.right  = 'auto';
  });
}

// 树的数据
function initForest() {
  trees = [];

  // 前景树（大，底部）
  const bigTrees = [
    { x: 0.12, y: 1.0, h: 0.55, w: 0.06, layers: 5, color: '#2a4a2a', glow: false },
    { x: 0.28, y: 1.0, h: 0.46, w: 0.05, layers: 4, color: '#1e3a1e', glow: false },
    { x: 0.72, y: 1.0, h: 0.50, w: 0.055, layers: 5, color: '#243824', glow: false },
    { x: 0.88, y: 1.0, h: 0.42, w: 0.045, layers: 4, color: '#1a301a', glow: false },
    { x: 0.20, y: 1.0, h: 0.62, w: 0.065, layers: 6, color: '#3a6a3a', glow: true, glowColor: 'rgba(120,200,100,0.12)' },
    { x: 0.82, y: 1.0, h: 0.68, w: 0.07, layers: 6, color: '#2e5a2e', glow: true, glowColor: 'rgba(140,200,120,0.10)' },
  ];
  // 中景树
  const midTrees = [
    { x: 0.05, y: 0.82, h: 0.34, w: 0.04, layers: 4, color: '#1a2e1a', glow: false },
    { x: 0.35, y: 0.80, h: 0.30, w: 0.035, layers: 3, color: '#162614', glow: false },
    { x: 0.50, y: 0.78, h: 0.32, w: 0.038, layers: 4, color: '#1c301c', glow: true, glowColor: 'rgba(180,220,140,0.08)' },
    { x: 0.62, y: 0.82, h: 0.28, w: 0.032, layers: 3, color: '#142212', glow: false },
    { x: 0.78, y: 0.79, h: 0.31, w: 0.036, layers: 3, color: '#182a18', glow: false },
    { x: 0.93, y: 0.81, h: 0.27, w: 0.03, layers: 3, color: '#142012', glow: false },
  ];
  // 远景树（中层，填充中部天空）
  const midFarTrees = [];
  for (let i = 0; i < 10; i++) {
    midFarTrees.push({
      x: 0.03 + i * 0.10 + Math.random() * 0.05,
      y: 0.70 + Math.random() * 0.06,
      h: 0.22 + Math.random() * 0.12,
      w: 0.022 + Math.random() * 0.014,
      layers: 3,
      color: '#0f2010',
      glow: false,
      far: true
    });
  }
  // 远景树（深层，填充上部）
  const farTrees = [];
  for (let i = 0; i < 16; i++) {
    farTrees.push({
      x: 0.01 + i * 0.065 + Math.random() * 0.04,
      y: 0.58 + Math.random() * 0.07,
      h: 0.12 + Math.random() * 0.09,
      w: 0.014 + Math.random() * 0.010,
      layers: 2,
      color: '#0b1a0c',
      glow: false,
      far: true
    });
  }
  // 极远景（更上方，接近地平线）
  const ultraFar = [];
  for (let i = 0; i < 20; i++) {
    ultraFar.push({
      x: i * 0.052 + Math.random() * 0.03,
      y: 0.50 + Math.random() * 0.06,
      h: 0.07 + Math.random() * 0.06,
      w: 0.010 + Math.random() * 0.008,
      layers: 2,
      color: '#091508',
      glow: false,
      far: true
    });
  }
  trees = [...ultraFar, ...farTrees, ...midFarTrees, ...midTrees, ...bigTrees];

  // 粒子（萤火虫）
  particles = [];
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random(),
      y: 0.3 + Math.random() * 0.6,
      r: 0.5 + Math.random() * 1.2,
      speed: 0.0002 + Math.random() * 0.0003,
      phase: Math.random() * Math.PI * 2,
      drift: (Math.random() - 0.5) * 0.0001,
      color: Math.random() > 0.5 ? 'rgba(180,230,140,' : 'rgba(140,210,160,'
    });
  }
}

function drawTree(tree, time) {
  const x = tree.x * W;
  const baseY = tree.y * H;
  const treeH = tree.h * H;
  // 用 min(W,H) 保证手机竖屏上树不会太细
  const base = Math.min(W, H);
  const treeW = tree.w * base;
  const sway = Math.sin(time * 0.4 + tree.x * 10) * 1.5;

  // 发光效果
  if (tree.glow) {
    const grad = ctx.createRadialGradient(x + sway, baseY - treeH * 0.5, 0, x + sway, baseY - treeH * 0.5, treeH * 0.7);
    grad.addColorStop(0, tree.glowColor);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x + sway, baseY - treeH * 0.5, treeH * 0.5, treeH * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 树干
  ctx.fillStyle = tree.far ? '#0a160a' : '#0d1a0d';
  ctx.fillRect(x - treeW * 0.08 + sway * 0.3, baseY - treeH * 0.18, treeW * 0.16, treeH * 0.2);

  // 树冠（多层三角）
  for (let l = 0; l < tree.layers; l++) {
    const progress = l / tree.layers;
    const layerY = baseY - treeH * (0.15 + progress * 0.85);
    const layerW = treeW * (1.0 - progress * 0.5) * (1 + Math.sin(time * 0.3 + l) * 0.01);
    const layerH = treeH * 0.28;
    const alpha = tree.far ? 0.5 + progress * 0.3 : 0.7 + progress * 0.2;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = tree.color;
    ctx.beginPath();
    ctx.moveTo(x + sway * (0.3 + progress * 0.7), layerY - layerH);
    ctx.lineTo(x - layerW + sway * 0.2, layerY + layerH * 0.3);
    ctx.lineTo(x + layerW + sway * 0.2, layerY + layerH * 0.3);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // 天空渐变
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#050c08');
  sky.addColorStop(0.4, '#081208');
  sky.addColorStop(0.7, '#0a160a');
  sky.addColorStop(1, '#0d1c0d');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 月光
  const moonGrad = ctx.createRadialGradient(W * 0.75, H * 0.12, 0, W * 0.75, H * 0.12, H * 0.35);
  moonGrad.addColorStop(0, 'rgba(180,220,160,0.06)');
  moonGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = moonGrad;
  ctx.fillRect(0, 0, W, H);

  // 月亮
  ctx.beginPath();
  ctx.arc(W * 0.75, H * 0.10, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220,240,200,0.12)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W * 0.75, H * 0.10, 12, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220,240,200,0.08)';
  ctx.fill();

  // 远处雾气（多层，填充中上部）
  const fog1 = ctx.createLinearGradient(0, H * 0.42, 0, H * 0.58);
  fog1.addColorStop(0, 'rgba(10,20,10,0)');
  fog1.addColorStop(0.5, 'rgba(8,18,8,0.25)');
  fog1.addColorStop(1, 'rgba(10,20,10,0)');
  ctx.fillStyle = fog1;
  ctx.fillRect(0, H * 0.42, W, H * 0.16);

  const fog2 = ctx.createLinearGradient(0, H * 0.52, 0, H * 0.68);
  fog2.addColorStop(0, 'rgba(15,30,15,0)');
  fog2.addColorStop(0.5, 'rgba(12,24,12,0.35)');
  fog2.addColorStop(1, 'rgba(10,20,10,0)');
  ctx.fillStyle = fog2;
  ctx.fillRect(0, H * 0.52, W, H * 0.16);

  // 画树
  trees.forEach(tree => drawTree(tree, t));

  // 地面雾
  const groundFog = ctx.createLinearGradient(0, H * 0.82, 0, H);
  groundFog.addColorStop(0, 'rgba(10,20,10,0)');
  groundFog.addColorStop(0.4, 'rgba(8,16,8,0.6)');
  groundFog.addColorStop(1, 'rgba(6,12,6,0.95)');
  ctx.fillStyle = groundFog;
  ctx.fillRect(0, H * 0.82, W, H * 0.18);

  // 萤火虫
  particles.forEach(p => {
    p.x += p.drift + Math.sin(t * p.speed * 100 + p.phase) * 0.0003;
    p.y += Math.cos(t * p.speed * 80 + p.phase) * 0.0002;
    if (p.x < 0) p.x = 1;
    if (p.x > 1) p.x = 0;
    if (p.y < 0.2) p.y = 0.9;
    if (p.y > 0.95) p.y = 0.25;

    const flicker = 0.4 + Math.sin(t * 2 + p.phase) * 0.35;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + flicker + ')';
    ctx.fill();

    // 光晕
    const glow = ctx.createRadialGradient(p.x * W, p.y * H, 0, p.x * W, p.y * H, p.r * 4);
    glow.addColorStop(0, p.color + (flicker * 0.3) + ')');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r * 4, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();

function showComingSoon(name) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(20,40,20,.92);border:1px solid rgba(120,200,100,.2);color:rgba(180,230,140,.8);padding:10px 24px;border-radius:99px;font-size:.8rem;letter-spacing:.1em;pointer-events:none;z-index:999;backdrop-filter:blur(8px)';
  el.textContent = name + ' · 即将上线';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}
draw();
</script>
</body>
</html>
