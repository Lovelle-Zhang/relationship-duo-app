<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>林 Link</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0f0a;
  font-family: sans-serif;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* 顶部标题 */
.title {
  position: fixed;
  top: 48px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}
.title-main {
  font-size: 28px;
  letter-spacing: 10px;
  color: rgba(255,255,255,0.75);
  font-weight: 300;
}
.title-sub {
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.2);
  margin-top: 6px;
}

/* 入口标签 */
.entry-label {
  position: fixed;
  pointer-events: auto;
  cursor: pointer;
  text-align: center;
  transition: opacity 0.3s;
}
.entry-label:hover { opacity: 0.85; }

.entry-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin: 0 auto 8px;
  animation: pulse 2.5s ease-in-out infinite;
}
.entry-name {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
}
.entry-desc {
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.2);
  margin-top: 4px;
  white-space: nowrap;
}

/* 四个入口位置 */
.entry-new {
  bottom: 22%;
  left: 18%;
}
.entry-new .entry-dot { background: rgba(120,180,120,0.8); box-shadow: 0 0 12px rgba(120,180,120,0.5); }

.entry-archive {
  bottom: 42%;
  right: 16%;
}
.entry-archive .entry-dot { background: rgba(160,200,140,0.7); box-shadow: 0 0 12px rgba(160,200,140,0.4); animation-delay: 0.8s; }

.entry-card {
  bottom: 30%;
  left: 50%;
  transform: translateX(-50%);
}
.entry-card .entry-dot { background: rgba(200,220,160,0.6); box-shadow: 0 0 10px rgba(200,220,160,0.35); animation-delay: 1.4s; }

.entry-map {
  top: 28%;
  right: 20%;
}
.entry-map .entry-dot { background: rgba(100,160,120,0.65); box-shadow: 0 0 14px rgba(100,160,120,0.4); animation-delay: 0.4s; }

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.6; }
}

/* 底部提示 */
.hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.12);
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="forest"></canvas>

<div class="title">
  <div class="title-main">林</div>
  <div class="title-sub">L I N K</div>
</div>

<!-- 入口1：新测试 -->
<div class="entry-label entry-new" onclick="window.location.href='index.html'">
  <div class="entry-dot"></div>
  <div class="entry-name">新的连接</div>
  <div class="entry-desc">开始频率测试</div>
</div>

<!-- 入口2：关系档案 -->
<div class="entry-label entry-archive" onclick="window.location.href='index.html'">
  <div class="entry-dot"></div>
  <div class="entry-name">已有的树</div>
  <div class="entry-desc">重测 · 看变化</div>
</div>

<!-- 入口3：今日卡牌 -->
<div class="entry-label entry-card" onclick="window.location.href='card.html'">
  <div class="entry-dot"></div>
  <div class="entry-name">今日对话</div>
  <div class="entry-desc">抽一张卡</div>
</div>

<!-- 入口4：关系地图 -->
<div class="entry-label entry-map" onclick="window.location.href='index.html'">
  <div class="entry-dot"></div>
  <div class="entry-name">关系地图</div>
  <div class="entry-desc">所有的连接</div>
</div>

<div class="hint">走进去，而不是点击进去</div>

<script>
const canvas = document.getElementById('forest');
const ctx = canvas.getContext('2d');

let W, H, trees = [], particles = [], t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initForest();
}

// 树的数据
function initForest() {
  trees = [];
  // 前景树（大）
  const bigTrees = [
    { x: 0.12, y: 1.0, h: 0.52, w: 0.06, layers: 5, color: '#2a4a2a', glow: false },
    { x: 0.28, y: 1.0, h: 0.44, w: 0.05, layers: 4, color: '#1e3a1e', glow: false },
    { x: 0.72, y: 1.0, h: 0.48, w: 0.055, layers: 5, color: '#243824', glow: false },
    { x: 0.88, y: 1.0, h: 0.40, w: 0.045, layers: 4, color: '#1a301a', glow: false },
    // 发光的树（入口附近）
    { x: 0.20, y: 1.0, h: 0.58, w: 0.065, layers: 6, color: '#3a6a3a', glow: true, glowColor: 'rgba(120,200,100,0.12)' },
    { x: 0.82, y: 1.0, h: 0.62, w: 0.07, layers: 6, color: '#2e5a2e', glow: true, glowColor: 'rgba(140,200,120,0.10)' },
  ];
  // 中景树
  const midTrees = [
    { x: 0.05, y: 0.82, h: 0.32, w: 0.04, layers: 4, color: '#1a2e1a', glow: false },
    { x: 0.35, y: 0.80, h: 0.28, w: 0.035, layers: 3, color: '#162614', glow: false },
    { x: 0.50, y: 0.78, h: 0.30, w: 0.038, layers: 4, color: '#1c301c', glow: true, glowColor: 'rgba(180,220,140,0.08)' },
    { x: 0.62, y: 0.82, h: 0.26, w: 0.032, layers: 3, color: '#142212', glow: false },
    { x: 0.78, y: 0.79, h: 0.29, w: 0.036, layers: 3, color: '#182a18', glow: false },
    { x: 0.93, y: 0.81, h: 0.25, w: 0.03, layers: 3, color: '#142012', glow: false },
  ];
  // 远景树（小，雾气中）
  const farTrees = [];
  for (let i = 0; i < 14; i++) {
    farTrees.push({
      x: 0.02 + i * 0.07 + Math.random() * 0.04,
      y: 0.62 + Math.random() * 0.08,
      h: 0.14 + Math.random() * 0.10,
      w: 0.018 + Math.random() * 0.012,
      layers: 3,
      color: '#0e1e0e',
      glow: false,
      far: true
    });
  }
  trees = [...farTrees, ...midTrees, ...bigTrees];

  // 粒子（萤火虫）
  particles = [];
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random(),
      y: 0.3 + Math.random() * 0.6,
      r: 0.5 + Math.random() * 1.2,
      speed: 0.0002 + Math.random() * 0.0003,
      phase: Math.random() * Math.PI * 2,
      drift: (Math.random() - 0.5) * 0.0001,
      color: Math.random() > 0.5 ? 'rgba(180,230,140,' : 'rgba(140,210,160,'
    });
  }
}

function drawTree(tree, time) {
  const x = tree.x * W;
  const baseY = tree.y * H;
  const treeH = tree.h * H;
  // 用 min(W,H) 保证手机竖屏上树不会太细
  const base = Math.min(W, H);
  const treeW = tree.w * base;
  const sway = Math.sin(time * 0.4 + tree.x * 10) * 1.5;

  // 发光效果
  if (tree.glow) {
    const grad = ctx.createRadialGradient(x + sway, baseY - treeH * 0.5, 0, x + sway, baseY - treeH * 0.5, treeH * 0.7);
    grad.addColorStop(0, tree.glowColor);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x + sway, baseY - treeH * 0.5, treeH * 0.5, treeH * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 树干
  ctx.fillStyle = tree.far ? '#0a160a' : '#0d1a0d';
  ctx.fillRect(x - treeW * 0.08 + sway * 0.3, baseY - treeH * 0.18, treeW * 0.16, treeH * 0.2);

  // 树冠（多层三角）
  for (let l = 0; l < tree.layers; l++) {
    const progress = l / tree.layers;
    const layerY = baseY - treeH * (0.15 + progress * 0.85);
    const layerW = treeW * (1.0 - progress * 0.5) * (1 + Math.sin(time * 0.3 + l) * 0.01);
    const layerH = treeH * 0.28;
    const alpha = tree.far ? 0.5 + progress * 0.3 : 0.7 + progress * 0.2;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = tree.color;
    ctx.beginPath();
    ctx.moveTo(x + sway * (0.3 + progress * 0.7), layerY - layerH);
    ctx.lineTo(x - layerW + sway * 0.2, layerY + layerH * 0.3);
    ctx.lineTo(x + layerW + sway * 0.2, layerY + layerH * 0.3);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // 天空渐变
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#050c08');
  sky.addColorStop(0.4, '#081208');
  sky.addColorStop(0.7, '#0a160a');
  sky.addColorStop(1, '#0d1c0d');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 月光
  const moonGrad = ctx.createRadialGradient(W * 0.75, H * 0.12, 0, W * 0.75, H * 0.12, H * 0.35);
  moonGrad.addColorStop(0, 'rgba(180,220,160,0.06)');
  moonGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = moonGrad;
  ctx.fillRect(0, 0, W, H);

  // 月亮
  ctx.beginPath();
  ctx.arc(W * 0.75, H * 0.10, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220,240,200,0.12)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W * 0.75, H * 0.10, 12, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220,240,200,0.08)';
  ctx.fill();

  // 远处雾气
  const fog = ctx.createLinearGradient(0, H * 0.55, 0, H * 0.72);
  fog.addColorStop(0, 'rgba(20,40,20,0)');
  fog.addColorStop(0.5, 'rgba(15,30,15,0.4)');
  fog.addColorStop(1, 'rgba(10,20,10,0)');
  ctx.fillStyle = fog;
  ctx.fillRect(0, H * 0.55, W, H * 0.17);

  // 画树
  trees.forEach(tree => drawTree(tree, t));

  // 地面雾
  const groundFog = ctx.createLinearGradient(0, H * 0.82, 0, H);
  groundFog.addColorStop(0, 'rgba(10,20,10,0)');
  groundFog.addColorStop(0.4, 'rgba(8,16,8,0.6)');
  groundFog.addColorStop(1, 'rgba(6,12,6,0.95)');
  ctx.fillStyle = groundFog;
  ctx.fillRect(0, H * 0.82, W, H * 0.18);

  // 萤火虫
  particles.forEach(p => {
    p.x += p.drift + Math.sin(t * p.speed * 100 + p.phase) * 0.0003;
    p.y += Math.cos(t * p.speed * 80 + p.phase) * 0.0002;
    if (p.x < 0) p.x = 1;
    if (p.x > 1) p.x = 0;
    if (p.y < 0.2) p.y = 0.9;
    if (p.y > 0.95) p.y = 0.25;

    const flicker = 0.4 + Math.sin(t * 2 + p.phase) * 0.35;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + flicker + ')';
    ctx.fill();

    // 光晕
    const glow = ctx.createRadialGradient(p.x * W, p.y * H, 0, p.x * W, p.y * H, p.r * 4);
    glow.addColorStop(0, p.color + (flicker * 0.3) + ')');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r * 4, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
