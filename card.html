<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>今日对话 · 林 Link</title>
<link rel="icon" type="image/png" href="images/lin-watermark-green.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #060b06; font-family: sans-serif; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

.ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 80px;
  pointer-events: none;
}

/* 顶部返回 */
.back {
  position: fixed;
  top: 28px; left: 24px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  font-weight: 600;
  letter-spacing: .18em;
  color: rgba(255,255,255,0.32);
  cursor: pointer;
  pointer-events: auto;
  transition: color 0.3s;
  z-index: 50;
  text-decoration: none;
}
.back:hover { color: rgba(255,255,255,0.78); }

/* 顶部标签 */
.top-label {
  position: fixed;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 15px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
  z-index: 50;
}

/* 卡片容器 */
.card-container {
  position: relative;
  width: min(280px, 72vw);
  height: min(392px, 100.8vw);
  perspective: 1000px;
  pointer-events: auto;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 12px;
}

.card-inner.flipping {
  transform: rotateY(90deg) scale(0.95);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 24px 64px rgba(0,0,0,0.8),
    0 0 32px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);
  backface-visibility: hidden;
}

.card-face svg { width: 100%; height: 100%; display: block; }

/* 底部操作 */
.actions {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  pointer-events: auto;
  z-index: 50;
}
.btn-another {
  font-size: 13px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  transition: color 0.2s;
  background: none;
  border: none;
  padding: 10px 24px;
}
.btn-another:hover { color: rgba(255,255,255,0.75); }

/* 底部感受输入区 */
.note-panel {
  display: none;
}
.note-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.18);
  margin-bottom: 10px;
}
.note-input-wrap {
  width: 200px;
}
.note-textarea {
  width: 100%;
  min-height: 36px;
  max-height: 100px;
  background: rgba(255,255,255,0.04);
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  border-radius: 0;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  line-height: 1.8;
  padding: 6px 4px;
  resize: none;
  outline: none;
  font-family: 'Noto Serif SC', serif;
  letter-spacing: 0.05em;
  transition: border-color 0.25s;
  box-sizing: border-box;
  text-align: center;
}
.note-textarea::placeholder {
  color: rgba(255,255,255,0.18);
  font-size: 11px;
  letter-spacing: 1px;
}
.note-textarea:focus {
  border-color: rgba(255,255,255,0.25);
}

/* 记录触发点 */
.note-trigger {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  pointer-events: auto;
  margin-top: 16px;
  opacity: 0;
  transition: opacity 0.5s;
}
.note-trigger.visible { opacity: 1; }
.note-trigger-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}
.note-trigger-dots span {
  display: block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: background 0.2s;
}
.note-trigger-dots span:nth-child(2) {
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.35);
}
.note-trigger-text {
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  font-family: 'Noto Serif SC', serif;
  transition: color 0.2s;
}
.note-trigger:hover .note-trigger-dots span { background: rgba(255,255,255,0.6); }
.note-trigger:hover .note-trigger-dots span:nth-child(2) { background: rgba(255,255,255,0.75); }
.note-trigger:hover .note-trigger-text { color: rgba(255,255,255,0.75); }

/* 右侧滑入输入面板 */
.note-drawer {
  position: fixed;
  top: 0; right: 0;
  width: min(340px, 85vw);
  height: 100%;
  background: rgba(12, 18, 28, 0.97);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-left: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  padding: 72px 36px 44px;
  box-sizing: border-box;
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: auto;
}
.note-drawer.open { transform: translateX(0); }
.note-drawer-label {
  font-size: 11px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 6px;
  font-family: 'Noto Serif SC', serif;
}
.note-drawer-sublabel {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.18);
  margin-bottom: 36px;
}
.note-drawer-textarea {
  flex: 1;
  background: transparent;
  border: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  outline: none;
  color: rgba(255,255,255,0.88);
  font-size: 16px;
  line-height: 2.1;
  font-family: 'Noto Serif SC', serif;
  letter-spacing: 0.06em;
  resize: none;
  padding: 24px 0 0;
}
.note-drawer-textarea::placeholder {
  color: rgba(255,255,255,0.2);
  font-size: 14px;
  line-height: 2.1;
}
.note-drawer-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.note-drawer-close {
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: color 0.2s;
}
.note-drawer-close:hover { color: rgba(255,255,255,0.65); }
.note-drawer-view {
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
  text-decoration: none;
  transition: color 0.2s;
}
.note-drawer-view:hover { color: rgba(255,255,255,0.6); }

/* 模式切换按钮 */
.mode-toggle {
  position: fixed;
  top: 30px; right: 24px;
  font-size: 15px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  pointer-events: auto;
  transition: color 0.2s;
  z-index: 50;
  user-select: none;
}
.mode-toggle:hover { color: rgba(255,255,255,0.9); }

/* 卡片正反面 */
.card-back {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 24px 64px rgba(0,0,0,0.8),
    0 0 32px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);
  backface-visibility: hidden;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #1a2e1a 0%, #0e1a0e 60%, #0a1208 100%);
}
.card-back svg { width: 100%; height: 100%; display: block; }

/* 双人模式布局 */
.duo-ui {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 3vw, 28px);
  padding: 60px 12px 100px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.duo-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  transition: opacity 0.4s;
  flex-shrink: 0;
}
/* 暗的那张：背面朝上，可点击 */
.duo-slot.inactive { opacity: 1; cursor: pointer; }
/* 亮的那张：正面朝上，不可点击 */
.duo-slot.active { opacity: 1; cursor: default; }

.duo-slot .card-container {
  width: 280px;
  height: 392px;
}
.duo-label {
  font-size: 13px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.28);
  cursor: pointer;
  transition: color 0.2s;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.duo-label:hover { color: rgba(255,255,255,0.55); }
.duo-slot.active .duo-label { color: rgba(255,255,255,0.65); }
.duo-label-edit {
  font-size: 10px;
  opacity: 0.4;
  letter-spacing: 1px;
}
.duo-label input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.8);
  font-size: 13px;
  letter-spacing: 3px;
  width: 80px;
  text-align: center;
  outline: none;
  font-family: sans-serif;
}
.duo-divider {
  width: 1px;
  height: 392px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.06), transparent);
  align-self: center;
  flex-shrink: 0;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<a class="back" href="forest.html"><span style="font-size:13px;line-height:1;margin-top:-1px">←</span><span>zenfix</span></a>
<div class="top-label" id="topLabel">今 日 对 话</div>
<div class="mode-toggle" id="modeToggle" onclick="toggleMode()">双人 ⇄</div>

<!-- 单人模式 -->
<div class="ui" id="soloUI" style="display:flex">
  <div class="card-container" id="cardWrap" onclick="drawCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face" id="cardFace"></div>
    </div>
  </div>
</div>

<!-- 双人模式 -->
<div class="duo-ui" id="duoUI" style="display:none">
  <div class="duo-slot" id="slotGreen">
    <div class="card-container" id="containerGreen" onclick="duoDraw('green')">
      <div class="card-inner" id="innerGreen">
        <div class="card-face" id="faceGreen"></div>
        <div class="card-back" id="backGreen"></div>
      </div>
    </div>
    <div class="duo-label" id="labelGreen" onclick="editLabel('green')">
      <span id="labelTextGreen">你</span>
      <span class="duo-label-edit">✎</span>
    </div>
  </div>
  <div class="duo-divider"></div>
  <div class="duo-slot" id="slotPurple">
    <div class="card-container" id="containerPurple" onclick="duoDraw('purple')">
      <div class="card-inner" id="innerPurple">
        <div class="card-face" id="facePurple"></div>
        <div class="card-back" id="backPurple"></div>
      </div>
    </div>
    <div class="duo-label" id="labelPurple" onclick="editLabel('purple')">
      <span id="labelTextPurple">TA</span>
      <span class="duo-label-edit">✎</span>
    </div>
  </div>
</div>

<div class="actions" id="soloActions" style="display:none">
  <div class="note-trigger" id="noteTrigger" onclick="openNoteDrawer()">
    <div class="note-trigger-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="note-trigger-text">记 录</div>
  </div>
  <div style="font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-top:14px">点击牌面抽下一张</div>
</div>

<!-- 右侧滑入输入面板 -->
<div class="note-drawer" id="noteDrawer">
  <div class="note-drawer-label">此 刻 感 受</div>
  <div class="note-drawer-sublabel">收起时自动保存</div>
  <textarea class="note-drawer-textarea" id="noteDrawerText" placeholder="写下此刻的感受&#10;&#10;不必完整，只是此刻..."></textarea>
  <div class="note-drawer-footer">
    <div class="note-drawer-close" onclick="closeNoteDrawer()">收 起</div>
    <span style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.15)">or</span>
    <a class="note-drawer-view" href="#" onclick="saveAndGo(event)">查看记录 →</a>
  </div>
</div>

<div class="actions" id="duoActions" style="display:none">
  <div class="card-type-label" id="duoTurnLabel"></div>
  <div style="font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-top:8px">点击对方的牌面翻牌</div>
</div>

<script>
// ============ 背景森林动画 ============
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, t = 0, trees = [], particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initBg();
}

function initBg() {
  trees = [];
  // 远景树（小、暗、少摇）
  for (let i = 0; i < 14; i++) {
    trees.push({
      x: Math.random(),
      y: 0.62 + Math.random() * 0.12,
      h: 0.10 + Math.random() * 0.14,
      w: 0.014 + Math.random() * 0.012,
      l: 2 + Math.floor(Math.random() * 2),
      c: `hsl(${210+Math.random()*20},${18+Math.random()*10}%,${6+Math.random()*5}%)`,
      phase: Math.random() * Math.PI * 2,
      far: true
    });
  }
  // 近景树（大、稍亮、摇摆）
  for (let i = 0; i < 10; i++) {
    trees.push({
      x: Math.random(),
      y: 0.78 + Math.random() * 0.22,
      h: 0.20 + Math.random() * 0.30,
      w: 0.028 + Math.random() * 0.022,
      l: 3 + Math.floor(Math.random() * 3),
      c: `hsl(${215+Math.random()*20},${22+Math.random()*12}%,${8+Math.random()*7}%)`,
      phase: Math.random() * Math.PI * 2,
      far: false
    });
  }
  particles = [];
  for (let i = 0; i < 25; i++) {
    particles.push({
      x: Math.random(), y: 0.3 + Math.random() * 0.6,
      r: 0.4 + Math.random() * 0.9,
      sp: 0.0002 + Math.random() * 0.0003,
      ph: Math.random() * Math.PI * 2,
      dr: (Math.random() - 0.5) * 0.0001,
      col: Math.random() > 0.5 ? 'rgba(180,230,140,' : 'rgba(140,210,160,'
    });
  }
}

function drawBg() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // 深蓝夜空
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0d1520');
  sky.addColorStop(0.4, '#111e2a');
  sky.addColorStop(0.75, '#0e1a14');
  sky.addColorStop(1, '#0a1410');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // 星星
  if (!drawBg._stars) {
    drawBg._stars = Array.from({length: 60}, () => ({
      x: Math.random(), y: Math.random() * 0.55,
      r: 0.3 + Math.random() * 0.8,
      ph: Math.random() * Math.PI * 2,
      sp: 0.5 + Math.random() * 1.5
    }));
  }
  drawBg._stars.forEach(s => {
    const fl = 0.4 + Math.sin(t * s.sp + s.ph) * 0.35;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,235,255,${fl * 0.6})`;
    ctx.fill();
  });

  // 月亮
  const mx = W * 0.75, my = H * 0.10;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, H * 0.3);
  mg.addColorStop(0, 'rgba(200,220,255,0.12)');
  mg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);
  ctx.beginPath();
  ctx.arc(mx, my, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(230,240,255,0.22)';
  ctx.fill();

  // 树剪影
  trees.forEach(tr => {
    const x = tr.x * W, by = tr.y * H, th = tr.h * H, tw = tr.w * W;
    const sw = Math.sin(t * 0.35 + tr.phase) * (tr.far ? 0.5 : 1.4);
    ctx.fillStyle = tr.c;
    ctx.globalAlpha = tr.far ? 0.7 : 0.9;
    ctx.fillRect(x - tw*0.07 + sw*0.2, by - th*0.15, tw*0.14, th*0.18);
    for (let l = 0; l < tr.l; l++) {
      const p = l / tr.l;
      ctx.globalAlpha = tr.far ? (0.55 + p*0.2) : (0.75 + p*0.2);
      ctx.beginPath();
      ctx.moveTo(x + sw*(0.3+p*0.7), by - th*(0.12+p*0.88));
      ctx.lineTo(x - tw*(1-p*0.4) + sw*0.15, by - th*0.1 + th*0.22);
      ctx.lineTo(x + tw*(1-p*0.4) + sw*0.15, by - th*0.1 + th*0.22);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // 地面雾
  const gf = ctx.createLinearGradient(0, H*0.78, 0, H);
  gf.addColorStop(0, 'rgba(0,0,0,0)');
  gf.addColorStop(0.5, 'rgba(8,14,10,0.7)');
  gf.addColorStop(1, 'rgba(5,10,7,0.95)');
  ctx.fillStyle = gf; ctx.fillRect(0, H*0.78, W, H*0.22);

  // 聚焦（轻）
  const focus = ctx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, H*0.72);
  focus.addColorStop(0, 'rgba(0,0,0,0)');
  focus.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = focus; ctx.fillRect(0, 0, W, H);

  // 萤火虫
  particles.forEach(p => {
    p.x += p.dr + Math.sin(t * p.sp * 100 + p.ph) * 0.0002;
    p.y += Math.cos(t * p.sp * 80 + p.ph) * 0.0001;
    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
    if (p.y < 0.2) p.y = 0.9; if (p.y > 0.95) p.y = 0.2;
    const fl = 0.35 + Math.sin(t * 1.8 + p.ph) * 0.35;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.col + fl + ')';
    ctx.fill();
  });

  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', resize);
resize();
drawBg();

// ============ 卡牌数据 ============
const CARDS = [
  // 绿牌·亲密
  { type: '绿牌·亲密', color: 'green', prompt: '说一件——', text: '有没有哪件小事，是\n你做了但没想到我会\n记住的？', id: 'I·01' },
  { type: '绿牌·亲密', color: 'green', prompt: '说实话——', text: '你上次偷偷看我，\n在看什么？', id: 'I·02' },
  { type: '绿牌·亲密', color: 'green', prompt: '随便一句——', text: '我说过哪句话，\n你觉得最像我？', id: 'I·04' },
  { type: '绿牌·亲密', color: 'green', prompt: '说一个——', text: '我做什么，会让你突\n然很想靠近我？', id: 'I·05' },
  { type: '绿牌·亲密', color: 'green', prompt: '说真的——', text: '你觉得，我知道\n你爱我吗？', id: 'I·06' },
  { type: '绿牌·亲密', color: 'green', prompt: '随便——', text: '牵手的时候，\n你在想什么？', id: 'I·07' },
  // 绿牌·日常
  { type: '绿牌·日常', color: 'green', prompt: '随便一件——', text: '今天我做了什么，\n你没说但心里\n记了一下？', id: 'D·01' },
  { type: '绿牌·日常', color: 'green', prompt: '说说——', text: '和我在一起，\n你最容易忘记时间\n是什么时候？', id: 'D·06' },
  { type: '绿牌·日常', color: 'green', prompt: '说说——', text: '你有没有注意过\n我睡着的样子？', id: 'D·07' },
  // 绿牌·沟通

function wrapSVGText(text, maxCharsPerLine) {
  // 先按 \n 分段，再对每段按字数截断
  const lines = [];
  text.split('\n').forEach(seg => {
    if (seg.length <= maxCharsPerLine) {
      lines.push(seg);
    } else {
      // 按字截断
      for (let i = 0; i < seg.length; i += maxCharsPerLine) {
        lines.push(seg.slice(i, i + maxCharsPerLine));
      }
    }
  });
  return lines;
}

let lastIndex = -1;
let isAnimating = false;
let currentCardText = '';

function drawCard() {
  if (isAnimating) return;
  isAnimating = true;

  const inner = document.getElementById('cardInner');
  const face = document.getElementById('cardFace');

  // 翻出去
  inner.classList.add('flipping');

  setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * SOLO_CARDS.length); } while (idx === lastIndex && SOLO_CARDS.length > 1);
    lastIndex = idx;
    const card = SOLO_CARDS[idx];
    currentCardText = card.text.replace(/\n/g, ' ');
    face.innerHTML = makeCardSVG(card);

    // 抽牌后显示"记录"触发点
    const trigger = document.getElementById('noteTrigger');
    if (trigger) trigger.classList.add('visible');

    // 翻回来
    inner.classList.remove('flipping');
    setTimeout(() => { isAnimating = false; }, 560);
  }, 280);
}

function openNoteDrawer() {
  document.getElementById('noteDrawer').classList.add('open');
  // 记录当前卡牌内容，供保存时使用
  setTimeout(() => document.getElementById('noteDrawerText').focus(), 350);
}

function saveNote() {
  const text = document.getElementById('noteDrawerText').value.trim();
  if (text) {
    const notes = JSON.parse(localStorage.getItem('lin_self_notes') || '[]');
    notes.unshift({
      id: Date.now(),
      date: new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }),
      cardText: currentCardText || '',
      note: text
    });
    localStorage.setItem('lin_self_notes', JSON.stringify(notes.slice(0, 200)));
    document.getElementById('noteDrawerText').value = '';
  }
}

function closeNoteDrawer() {
  saveNote();
  document.getElementById('noteDrawer').classList.remove('open');
}

function saveAndGo(e) {
  e.preventDefault();
  saveNote();
  window.location.href = 'self.html';
}

// 点击 drawer 外部关闭
document.addEventListener('click', (e) => {
  const drawer = document.getElementById('noteDrawer');
  if (drawer && drawer.classList.contains('open') && !drawer.contains(e.target)) {
    const trigger = document.getElementById('noteTrigger');
    if (!trigger || !trigger.contains(e.target)) closeNoteDrawer();
  }
});

// 页面加载时直接进单人模式
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('soloActions').style.display = 'flex';
  drawCard();
});

function duoInit() {
  // 预填内容（背面不可见，但内容已就绪）
  duoLoadCard('green');
  duoLoadCard('purple');
  // 初始状态：green正面朝上（亮），purple背面朝上（暗）
  duoTurn = 'green';
  applyDuoState(false);
  updateDuoTurnLabel();
}

function duoLoadCard(color) {
  const isGreen = color === 'green';
  const pool = isGreen ? GREEN_CARDS : PURPLE_CARDS;
  let lastIdx = isGreen ? lastGreenIdx : lastPurpleIdx;
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (idx === lastIdx && pool.length > 1);
  if (isGreen) lastGreenIdx = idx; else lastPurpleIdx = idx;
  const face = document.getElementById(isGreen ? 'faceGreen' : 'facePurple');
  const back = document.getElementById(isGreen ? 'backGreen' : 'backPurple');
  face.innerHTML = makeCardSVG(pool[idx]);
  back.innerHTML = makeBackSVG(color);
}

function applyDuoState(animate) {
  const innerG = document.getElementById('innerGreen');
  const innerP = document.getElementById('innerPurple');
  const slotG = document.getElementById('slotGreen');
  const slotP = document.getElementById('slotPurple');

  const applyTransform = () => {
    if (duoTurn === 'green') {
      innerG.style.transform = 'rotateY(0deg)';
      innerP.style.transform = 'rotateY(180deg)';
      slotG.className = 'duo-slot active';
      slotP.className = 'duo-slot inactive';
    } else {
      innerG.style.transform = 'rotateY(180deg)';
      innerP.style.transform = 'rotateY(0deg)';
      slotG.className = 'duo-slot inactive';
      slotP.className = 'duo-slot active';
    }
  };

  if (!animate) {
    innerG.style.transition = 'none';
    innerP.style.transition = 'none';
    applyTransform();
    // 下一帧恢复动画
    requestAnimationFrame(() => {
      innerG.style.transition = '';
      innerP.style.transition = '';
    });
  } else {
    applyTransform();
  }
}

function duoDraw(color) {
  if (color === duoTurn) return;
  if (isAnimatingDuo) return;
  isAnimatingDuo = true;

  const isGreen = color === 'green';
  const innerActive = document.getElementById(duoTurn === 'green' ? 'innerGreen' : 'innerPurple');
  const innerInactive = document.getElementById(isGreen ? 'innerGreen' : 'innerPurple');
  const slotG = document.getElementById('slotGreen');
  const slotP = document.getElementById('slotPurple');

  // 第一阶段：两张都转到90°（消失）
  innerActive.style.transform = 'rotateY(90deg) scale(0.96)';
  innerInactive.style.transform = 'rotateY(90deg) scale(0.96)';

  setTimeout(() => {
    // 中途换内容（用户看不见）
    duoLoadCard(color);
    duoTurn = color;

    // 更新 slot 状态
    if (duoTurn === 'green') {
      slotG.className = 'duo-slot active';
      slotP.className = 'duo-slot inactive';
    } else {
      slotG.className = 'duo-slot inactive';
      slotP.className = 'duo-slot active';
    }

    // 第二阶段：新正面转到0°，新背面转到180°
    requestAnimationFrame(() => {
      innerActive.style.transform = 'rotateY(180deg)';
      innerInactive.style.transform = 'rotateY(0deg)';
    });

    setTimeout(() => {
      isAnimatingDuo = false;
      updateDuoTurnLabel();
    }, 500);
  }, 280);
}

function updateDuoTurnLabel() {
  const label = document.getElementById('duoTurnLabel');
  const nameG = document.getElementById('labelTextGreen').textContent;
  const nameP = document.getElementById('labelTextPurple').textContent;
  label.textContent = duoTurn === 'green'
    ? `${nameP} 来 抽`
    : `${nameG} 来 抽`;
}

// ── 名称编辑 ──
function editLabel(color) {
  const spanId = color === 'green' ? 'labelTextGreen' : 'labelTextPurple';
  const labelEl = document.getElementById(color === 'green' ? 'labelGreen' : 'labelPurple');
  const span = document.getElementById(spanId);
  const current = span.textContent;

  const input = document.createElement('input');
  input.value = current;
  input.maxLength = 6;
  labelEl.innerHTML = '';
  labelEl.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const val = input.value.trim() || current;
    labelEl.innerHTML = `<span id="${spanId}">${val}</span><span class="duo-label-edit">✎</span>`;
    labelEl.onclick = () => editLabel(color);
    updateDuoTurnLabel();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}
