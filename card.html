<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>今日对话 · 林 Link</title>
<link rel="icon" type="image/png" href="images/lin-watermark-green.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #060b06; font-family: sans-serif; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

.ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 80px;
  pointer-events: none;
}

/* 顶部返回 */
.back {
  position: fixed;
  top: 32px; left: 24px;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  pointer-events: auto;
  transition: color 0.2s;
}
.back:hover { color: rgba(255,255,255,0.6); }

/* 顶部标签 */
.top-label {
  position: fixed;
  top: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.2);
  white-space: nowrap;
}

/* 卡片容器 */
.card-container {
  position: relative;
  width: min(280px, 72vw);
  height: min(392px, 100.8vw);
  perspective: 1000px;
  pointer-events: auto;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.22,1,0.36,1);
  border-radius: 12px;
}

.card-inner.flipping {
  transform: rotateY(90deg) scale(0.95);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 24px 64px rgba(0,0,0,0.8),
    0 0 32px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);
  backface-visibility: hidden;
}

.card-face svg { width: 100%; height: 100%; display: block; }

/* 底部操作 */
.actions {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  pointer-events: auto;
}
.btn-another {
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: color 0.2s;
  background: none;
  border: none;
  padding: 8px 20px;
}
.btn-another:hover { color: rgba(255,255,255,0.7); }

/* 模式选择覆盖层 */
.mode-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,14,10,0.96);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 12px;
}
.mode-title {
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 24px;
}
.mode-btn {
  width: 200px;
  padding: 16px 0;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Serif SC', serif;
}
.mode-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.95);
}
.mode-btn.green { border-color: rgba(120,200,100,0.2); }
.mode-btn.green:hover { background: rgba(90,160,80,0.12); border-color: rgba(120,200,100,0.4); }
.mode-btn.purple { border-color: rgba(160,120,200,0.2); }
.mode-btn.purple:hover { background: rgba(120,80,160,0.12); border-color: rgba(160,120,200,0.4); }

/* 双人模式布局 */
.duo-ui {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding-bottom: 80px;
}
.duo-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: opacity 0.3s;
}
.duo-slot.inactive { opacity: 0.35; }
.duo-slot .card-container {
  width: min(160px, 42vw);
  height: min(224px, 58.8vw);
}
.duo-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.25);
}
.duo-slot.active .duo-label { color: rgba(255,255,255,0.55); }
.duo-divider {
  width: 1px;
  height: min(224px, 58.8vw);
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08), transparent);
  align-self: center;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="back" onclick="window.location.href='forest.html'">← 林</div>
<div class="top-label" id="topLabel">今 日 对 话</div>

<!-- 模式选择 -->
<div class="mode-overlay" id="modeOverlay">
  <div class="mode-title">选择模式</div>
  <button class="mode-btn green" onclick="startMode('solo')">单人探索</button>
  <button class="mode-btn purple" onclick="startMode('duo')">双人对话</button>
</div>

<!-- 单人模式 -->
<div class="ui" id="soloUI" style="display:none">
  <div class="card-container" id="cardWrap">
    <div class="card-inner" id="cardInner">
      <div class="card-face" id="cardFace"></div>
    </div>
  </div>
</div>

<!-- 双人模式 -->
<div class="duo-ui" id="duoUI" style="display:none">
  <div class="duo-slot" id="slotGreen">
    <div class="card-container" onclick="duoDraw('green')">
      <div class="card-inner" id="innerGreen">
        <div class="card-face" id="faceGreen"></div>
      </div>
    </div>
    <div class="duo-label" id="labelGreen">你</div>
  </div>
  <div class="duo-divider"></div>
  <div class="duo-slot" id="slotPurple">
    <div class="card-container" onclick="duoDraw('purple')">
      <div class="card-inner" id="innerPurple">
        <div class="card-face" id="facePurple"></div>
      </div>
    </div>
    <div class="duo-label" id="labelPurple">TA</div>
  </div>
</div>

<div class="actions" id="soloActions" style="display:none">
  <div class="card-type-label" id="typeLabel"></div>
  <button class="btn-another" onclick="drawCard()">再抽一张</button>
</div>

<div class="actions" id="duoActions" style="display:none">
  <div class="card-type-label" id="duoTurnLabel"></div>
</div>

<script>
// ============ 背景森林动画 ============
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, t = 0, trees = [], particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initBg();
}

function initBg() {
  trees = [];
  // 远景树（小、暗、少摇）
  for (let i = 0; i < 14; i++) {
    trees.push({
      x: Math.random(),
      y: 0.62 + Math.random() * 0.12,
      h: 0.10 + Math.random() * 0.14,
      w: 0.014 + Math.random() * 0.012,
      l: 2 + Math.floor(Math.random() * 2),
      c: `hsl(${210+Math.random()*20},${18+Math.random()*10}%,${6+Math.random()*5}%)`,
      phase: Math.random() * Math.PI * 2,
      far: true
    });
  }
  // 近景树（大、稍亮、摇摆）
  for (let i = 0; i < 10; i++) {
    trees.push({
      x: Math.random(),
      y: 0.78 + Math.random() * 0.22,
      h: 0.20 + Math.random() * 0.30,
      w: 0.028 + Math.random() * 0.022,
      l: 3 + Math.floor(Math.random() * 3),
      c: `hsl(${215+Math.random()*20},${22+Math.random()*12}%,${8+Math.random()*7}%)`,
      phase: Math.random() * Math.PI * 2,
      far: false
    });
  }
  particles = [];
  for (let i = 0; i < 25; i++) {
    particles.push({
      x: Math.random(), y: 0.3 + Math.random() * 0.6,
      r: 0.4 + Math.random() * 0.9,
      sp: 0.0002 + Math.random() * 0.0003,
      ph: Math.random() * Math.PI * 2,
      dr: (Math.random() - 0.5) * 0.0001,
      col: Math.random() > 0.5 ? 'rgba(180,230,140,' : 'rgba(140,210,160,'
    });
  }
}

function drawBg() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // 深蓝夜空
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0d1520');
  sky.addColorStop(0.4, '#111e2a');
  sky.addColorStop(0.75, '#0e1a14');
  sky.addColorStop(1, '#0a1410');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // 星星
  if (!drawBg._stars) {
    drawBg._stars = Array.from({length: 60}, () => ({
      x: Math.random(), y: Math.random() * 0.55,
      r: 0.3 + Math.random() * 0.8,
      ph: Math.random() * Math.PI * 2,
      sp: 0.5 + Math.random() * 1.5
    }));
  }
  drawBg._stars.forEach(s => {
    const fl = 0.4 + Math.sin(t * s.sp + s.ph) * 0.35;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,235,255,${fl * 0.6})`;
    ctx.fill();
  });

  // 月亮
  const mx = W * 0.75, my = H * 0.10;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, H * 0.3);
  mg.addColorStop(0, 'rgba(200,220,255,0.12)');
  mg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);
  ctx.beginPath();
  ctx.arc(mx, my, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(230,240,255,0.22)';
  ctx.fill();

  // 树剪影
  trees.forEach(tr => {
    const x = tr.x * W, by = tr.y * H, th = tr.h * H, tw = tr.w * W;
    const sw = Math.sin(t * 0.35 + tr.phase) * (tr.far ? 0.5 : 1.4);
    ctx.fillStyle = tr.c;
    ctx.globalAlpha = tr.far ? 0.7 : 0.9;
    ctx.fillRect(x - tw*0.07 + sw*0.2, by - th*0.15, tw*0.14, th*0.18);
    for (let l = 0; l < tr.l; l++) {
      const p = l / tr.l;
      ctx.globalAlpha = tr.far ? (0.55 + p*0.2) : (0.75 + p*0.2);
      ctx.beginPath();
      ctx.moveTo(x + sw*(0.3+p*0.7), by - th*(0.12+p*0.88));
      ctx.lineTo(x - tw*(1-p*0.4) + sw*0.15, by - th*0.1 + th*0.22);
      ctx.lineTo(x + tw*(1-p*0.4) + sw*0.15, by - th*0.1 + th*0.22);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // 地面雾
  const gf = ctx.createLinearGradient(0, H*0.78, 0, H);
  gf.addColorStop(0, 'rgba(0,0,0,0)');
  gf.addColorStop(0.5, 'rgba(8,14,10,0.7)');
  gf.addColorStop(1, 'rgba(5,10,7,0.95)');
  ctx.fillStyle = gf; ctx.fillRect(0, H*0.78, W, H*0.22);

  // 聚焦（轻）
  const focus = ctx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, H*0.72);
  focus.addColorStop(0, 'rgba(0,0,0,0)');
  focus.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = focus; ctx.fillRect(0, 0, W, H);

  // 萤火虫
  particles.forEach(p => {
    p.x += p.dr + Math.sin(t * p.sp * 100 + p.ph) * 0.0002;
    p.y += Math.cos(t * p.sp * 80 + p.ph) * 0.0001;
    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
    if (p.y < 0.2) p.y = 0.9; if (p.y > 0.95) p.y = 0.2;
    const fl = 0.35 + Math.sin(t * 1.8 + p.ph) * 0.35;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.col + fl + ')';
    ctx.fill();
  });

  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', resize);
resize();
drawBg();

// ============ 卡牌数据 ============

  { type: '绿牌·日常', color: 'green', prompt: '说说——', text: '你有没有注意过\n我睡着的样子？', id: 'D·07' },
  // 绿牌·沟通
  { type: '绿牌·沟通', color: 'green', prompt: '说个场景——', text: '你什么时候最不想\n和我说话？', id: 'C·04' },
  { type: '绿牌·沟通', color: 'green', prompt: '说实话——', text: '我说「没事」的时候，\n你信吗？', id: 'C·06' },
  { type: '绿牌·沟通', color: 'green', prompt: '问吧——', text: '现在可以问我一个问题，\n我保证说实话', id: 'C·07' },
  // 绿牌·修复
  { type: '绿牌·修复', color: 'green', prompt: '说清楚——', text: '你生气的时候，需要\n我消失还是在场？', id: 'R·04' },
  { type: '绿牌·修复', color: 'green', prompt: '慢慢说——', text: '我们之间，有没有一\n件事一直没说清楚？', id: 'R·06' },
  // 绿牌·支持
  { type: '绿牌·支持', color: 'green', prompt: '说清楚——', text: '你压力大的时候，需\n要我说话还是安静？', id: 'S·01' },
  { type: '绿牌·支持', color: 'green', prompt: '说实话——', text: '你最担心我的，\n是什么？', id: 'S·04' },

  { type: '绿牌·信任', color: 'green', prompt: '说直接——', text: '你最信任我的，\n是哪一面？', id: 'T·02' },
  { type: '绿牌·信任', color: 'green', prompt: '说实话——', text: '你会让我看见你\n最坏的那面吗？', id: 'T·07' },
  // 紫牌·亲密
  { type: '紫牌·亲密', color: 'purple', prompt: '说说——', text: '有没有哪件小事，是\n我做了但你没想到自\n己会一直记着？', id: 'I·01' },
  { type: '紫牌·亲密', color: 'purple', prompt: '说一样——', text: '你哪里比我想象中\n更好一点？', id: 'I·03' },
  { type: '紫牌·亲密', color: 'purple', prompt: '随便——', text: '和你在一起，\n我是什么感觉？', id: 'I·05' },
  // 紫牌·沟通
  { type: '紫牌·沟通', color: 'purple', prompt: '随便一句——', text: '你说过哪句话，\n我记到现在？', id: 'C·02' },
  { type: '紫牌·沟通', color: 'purple', prompt: '说一件——', text: '有没有一件事，你误\n解了我，我没有解释？', id: 'C·05' },
  // 紫牌·修复
  { type: '紫牌·修复', color: 'purple', prompt: '说实话——', text: '我道歉的方式，\n对你有用吗？', id: 'R·02' },
  { type: '紫牌·修复', color: 'purple', prompt: '说个信号——', text: '什么时候，你会觉得\n我们好了？', id: 'R·07' },
  // 紫牌·支持
  { type: '紫牌·支持', color: 'purple', prompt: '说一次——', text: '最近有没有一刻，\n你让我觉得不孤单？', id: 'S·05' },
  // 紫牌·体验
  { type: '紫牌·体验', color: 'purple', prompt: '瞎想——', text: '如果可以消失一周，\n你想带我去哪里？', id: 'E·02' },
  { type: '紫牌·体验', color: 'purple', prompt: '有的话说——', text: '有没有一首歌，\n是我们的歌？', id: 'E·07' },
  // 特殊牌
  { type: '特殊牌', color: 'special', prompt: '', text: '不说话了', sub: '抱一会儿再继续', id: 'S·01' },
  { type: '特殊牌', color: 'special', prompt: '', text: '今晚只说好事', sub: '各说三件', id: 'S·03' },
  { type: '特殊牌', color: 'special', prompt: '', text: '今天，夸我一件事', sub: '认真的', id: 'S·05' },
];

function makeCardSVG(card) {

    return `<svg width="220" height="308" viewBox="0 0 240 336" xmlns="http://www.w3.org/2000/svg">

  <line x1="18" y1="18" x2="18" y2="46" stroke="rgba(255,255,255,.06)" stroke-width="0.6"/>
  <text x="22" y="28" font-family="sans-serif" font-size="10" letter-spacing="2" fill="#5a7a5a" opacity="0.6">绿牌</text>
  <text x="218" y="24" text-anchor="end" font-family="sans-serif" font-size="9" fill="#c47a7a" opacity="0.55">${card.type.split('·')[1]}</text>
  <text x="218" y="36" text-anchor="end" font-family="sans-serif" font-size="9" fill="#c47a7a" opacity="0.7">${card.id}</text>
  <line x1="22" y1="42" x2="64" y2="42" stroke="#c47a7a" stroke-width="0.8" opacity="0.45"/>
  <text x="22" y="74" font-family="serif" font-style="italic" font-size="11" fill="rgba(255,255,255,.28)" letter-spacing="0.5">${card.prompt}</text>
  ${card.text.split('\n').map((line, i) => `<text x="22" y="${118 + i*30}" font-size="17" letter-spacing="0.5" fill="rgba(255,255,255,.88)" font-family="sans-serif">${line}</text>`).join('')}

  } else if (card.color === 'purple') {
    return `<svg width="220" height="308" viewBox="0 0 240 336" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="70%" cy="20%" r="80%">

    </radialGradient>
  </defs>
  <rect width="240" height="336" fill="url(#bg)"/>

let lastIndex = -1;
let isAnimating = false;

function drawCard() {
  if (isAnimating) return;
  isAnimating = true;

  const inner = document.getElementById('cardInner');
  const face = document.getElementById('cardFace');
  const typeLabel = document.getElementById('typeLabel');

  // 翻出去
  inner.classList.add('flipping');

  setTimeout(() => {
    // 换内容（在翻转中途，用户看不见）
    let idx;
    do { idx = Math.floor(Math.random() * CARDS.length); } while (idx === lastIndex && CARDS.length > 1);
    lastIndex = idx;
    const card = CARDS[idx];
    face.innerHTML = makeCardSVG(card);
    typeLabel.textContent = card.type;

    // 翻回来
    inner.classList.remove('flipping');
    setTimeout(() => { isAnimating = false; }, 560);
  }, 280);
}

// ── 模式控制 ──
const GREEN_CARDS = CARDS.filter(c => c.color === 'green');
const PURPLE_CARDS = CARDS.filter(c => c.color === 'purple');

let duoTurn = 'green'; // 当前轮到谁
let lastGreenIdx = -1, lastPurpleIdx = -1;
let isAnimatingGreen = false, isAnimatingPurple = false;

function startMode(mode) {
  document.getElementById('modeOverlay').style.display = 'none';
  if (mode === 'solo') {
    document.getElementById('soloUI').style.display = 'flex';
    document.getElementById('soloActions').style.display = 'flex';
    document.getElementById('topLabel').textContent = '今 日 对 话';
    drawCard();
  } else {
    document.getElementById('duoUI').style.display = 'flex';
    document.getElementById('duoActions').style.display = 'flex';
    document.getElementById('topLabel').textContent = '双 人 对 话';
    duoInit();
  }
}

function duoInit() {
  // 初始各抽一张
  duoFlip('green', true);
  duoFlip('purple', true);
  updateDuoTurn();
}

function duoDraw(color) {
  if (color !== duoTurn) return; // 不是你的轮次
  duoFlip(color, false);
  duoTurn = color === 'green' ? 'purple' : 'green';
  updateDuoTurn();
}

function duoFlip(color, init) {
  const isGreen = color === 'green';
  if (isGreen && isAnimatingGreen) return;
  if (!isGreen && isAnimatingPurple) return;
  if (isGreen) isAnimatingGreen = true; else isAnimatingPurple = true;

  const inner = document.getElementById(isGreen ? 'innerGreen' : 'innerPurple');
  const face = document.getElementById(isGreen ? 'faceGreen' : 'facePurple');
  const pool = isGreen ? GREEN_CARDS : PURPLE_CARDS;
  let lastIdx = isGreen ? lastGreenIdx : lastPurpleIdx;

  inner.classList.add('flipping');
  setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * pool.length); } while (idx === lastIdx && pool.length > 1);
    if (isGreen) lastGreenIdx = idx; else lastPurpleIdx = idx;
    face.innerHTML = makeCardSVG(pool[idx]);
    inner.classList.remove('flipping');
    setTimeout(() => {
      if (isGreen) isAnimatingGreen = false; else isAnimatingPurple = false;
    }, 560);
  }, init ? 0 : 280);
}

function updateDuoTurn() {
  const slotG = document.getElementById('slotGreen');
  const slotP = document.getElementById('slotPurple');
  const label = document.getElementById('duoTurnLabel');
  if (duoTurn === 'green') {
    slotG.className = 'duo-slot active';
    slotP.className = 'duo-slot inactive';
    label.textContent = '你 来 抽';
  } else {
    slotG.className = 'duo-slot inactive';
    slotP.className = 'duo-slot active';
    label.textContent = 'TA 来 抽';
  }
}

// 单人模式 drawCard 已在上方定义，不自动调用
