<script>
// ============ й‘іеұҫж«ҷеҰ«оҶҪзҒ„йҚ”г„§ж•ҫ ============
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, t = 0, trees = [], particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initBg();
}

function initBg() {
  trees = [];
  // жқ©ж»„ж«ҷйҸҚжҲҜзҙҷзҒҸеҝӢвӮ¬дҪ№ж®«йҠҶдҪёзҡҜйҺҪеӣ·зҙҡ
  for (let i = 0; i < 14; i++) {
    trees.push({
      x: Math.random(),
      y: 0.62 + Math.random() * 0.12,
      h: 0.10 + Math.random() * 0.14,
      w: 0.014 + Math.random() * 0.012,
      l: 2 + Math.floor(Math.random() * 2),
      c: `hsl(${210+Math.random()*20},${18+Math.random()*10}%,${6+Math.random()*5}%)`,
      phase: Math.random() * Math.PI * 2,
      far: true
    });
  }
  // жқ©жҲһж«ҷйҸҚжҲҜзҙҷжҫ¶СҒвӮ¬дҪәв—ўжөңоҶәвӮ¬дҪ№жҶһйҺҪе—ӯзҙҡ
  for (let i = 0; i < 10; i++) {
    trees.push({
      x: Math.random(),
      y: 0.78 + Math.random() * 0.22,
      h: 0.20 + Math.random() * 0.30,
      w: 0.028 + Math.random() * 0.022,
      l: 3 + Math.floor(Math.random() * 3),
      c: `hsl(${215+Math.random()*20},${22+Math.random()*12}%,${8+Math.random()*7}%)`,
      phase: Math.random() * Math.PI * 2,
      far: false
    });
  }
  particles = [];
  for (let i = 0; i < 25; i++) {
    particles.push({
      x: Math.random(), y: 0.3 + Math.random() * 0.6,
      r: 0.4 + Math.random() * 0.9,
      sp: 0.0002 + Math.random() * 0.0003,
      ph: Math.random() * Math.PI * 2,
      dr: (Math.random() - 0.5) * 0.0001,
      col: Math.random() > 0.5 ? 'rgba(180,230,140,' : 'rgba(140,210,160,'
    });
  }
}

function drawBg() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // еЁЈиҫ«ж‘‘жҫ¶ж»…в”–
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0d1520');
  sky.addColorStop(0.4, '#111e2a');
  sky.addColorStop(0.75, '#0e1a14');
  sky.addColorStop(1, '#0a1410');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // йҸ„зҶёж§Ұ
  if (!drawBg._stars) {
    drawBg._stars = Array.from({length: 60}, () => ({
      x: Math.random(), y: Math.random() * 0.55,
      r: 0.3 + Math.random() * 0.8,
      ph: Math.random() * Math.PI * 2,
      sp: 0.5 + Math.random() * 1.5
    }));
  }
  drawBg._stars.forEach(s => {
    const fl = 0.4 + Math.sin(t * s.sp + s.ph) * 0.35;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,235,255,${fl * 0.6})`;
    ctx.fill();
  });

  // йҸҲе ңеҜ’
  const mx = W * 0.75, my = H * 0.10;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, H * 0.3);
  mg.addColorStop(0, 'rgba(200,220,255,0.12)');
  mg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);
  ctx.beginPath();
  ctx.arc(mx, my, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(230,240,255,0.22)';
  ctx.fill();

  // йҸҚжҲқеЈҖиӨ°?  trees.forEach(tr => {
    const x = tr.x * W, by = tr.y * H, th = tr.h * H, tw = tr.w * W;
    const sw = Math.sin(t * 0.35 + tr.phase) * (tr.far ? 0.5 : 1.4);
    ctx.fillStyle = tr.c;
    ctx.globalAlpha = tr.far ? 0.7 : 0.9;
    ctx.fillRect(x - tw*0.07 + sw*0.2, by - th*0.15, tw*0.14, th*0.18);
    for (let l = 0; l < tr.l; l++) {
      const p = l / tr.l;
      ctx.globalAlpha = tr.far ? (0.55 + p*0.2) : (0.75 + p*0.2);
      ctx.beginPath();
      ctx.moveTo(x + sw*(0.3+p*0.7), by - th*(0.12+p*0.88));
      ctx.lineTo(x - tw*(1-p*0.4) + sw*0.15, by - th*0.1 + th*0.22);
      ctx.lineTo(x + tw*(1-p*0.4) + sw*0.15, by - th*0.1 + th*0.22);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // йҚҰдјҙжҪ°й—Ҷ?  const gf = ctx.createLinearGradient(0, H*0.78, 0, H);
  gf.addColorStop(0, 'rgba(0,0,0,0)');
  gf.addColorStop(0.5, 'rgba(8,14,10,0.7)');
  gf.addColorStop(1, 'rgba(5,10,7,0.95)');
  ctx.fillStyle = gf; ctx.fillRect(0, H*0.78, W, H*0.22);

  // й‘ұж°ұеҠҚй”ӣе ЈдәӨй”ӣ?  const focus = ctx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, H*0.72);
  focus.addColorStop(0, 'rgba(0,0,0,0)');
  focus.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = focus; ctx.fillRect(0, 0, W, H);

  // й’ҖгӮҮдјҖй“Ҹ?  particles.forEach(p => {
    p.x += p.dr + Math.sin(t * p.sp * 100 + p.ph) * 0.0002;
    p.y += Math.cos(t * p.sp * 80 + p.ph) * 0.0001;
    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
    if (p.y < 0.2) p.y = 0.9; if (p.y > 0.95) p.y = 0.2;
    const fl = 0.35 + Math.sin(t * 1.8 + p.ph) * 0.35;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.col + fl + ')';
    ctx.fill();
  });

  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', resize);
resize();
drawBg();

// ============ йҚ—пј„еўқйҸҒзүҲеөҒ ============
const CARDS = [
  // зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘
  { type: 'зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘', color: 'green', prompt: 'з’Үзҝ з«ҙжө еһӣвӮ¬ж–әвӮ¬?, text: 'йҸҲеӨӢз—…йҸҲеӨҠж‘ўжө и·әзҡ¬жөңе¬¶зҙқйҸ„з—ӢnжөЈзҠІд»ӣжөңе—•зөҫеЁҢв„ғе…ӮйҚ’зүҲеһңжөјжӯ•nз’ҒйўҒз¶ҮйҗЁеӢ¶зҙө', id: 'Iи·Ҝ01' },
  { type: 'зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘', color: 'green', prompt: 'з’Үжқ‘з–„з’ҮжҝғвӮ¬ж–әвӮ¬?, text: 'жөЈзҠұз¬ӮеЁҶвҖідј”йҚӢйЈҺж№…йҺҙжҲҜзҙқ\nйҚҰг„§ж№…жө вӮ¬ж¶”е ¬зҙө', id: 'Iи·Ҝ02' },
  { type: 'зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘', color: 'green', prompt: 'й—…еҝҺз©¶ж¶“вӮ¬йҚҷгғўвӮ¬ж–әвӮ¬?, text: 'йҺҙжҲЈоҮ©жқ©еӣ§ж‘ўйҚҷгғЁзҳҪй”ӣеӯҝnжөЈзҠәоқҺеҜ°жҘҒжё¶йҚҚеҝ”еһңй”ӣ?, id: 'Iи·Ҝ04' },
  { type: 'зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘', color: 'green', prompt: 'з’Үзҝ з«ҙж¶“оҒҒвӮ¬ж–әвӮ¬?, text: 'йҺҙжҲқд»ӣжө вӮ¬ж¶”е ¬зҙқжөјж°іоҶҖжөЈзҠөзҚҠ\nйҗ’и·әз·ўйҺҜжҠҪжҪ¬жқ©жҲһеһңй”ӣ?, id: 'Iи·Ҝ05' },
  { type: 'зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘', color: 'green', prompt: 'з’ҮеҜёж№ЎйҗЁеӢЁвӮ¬ж–әвӮ¬?, text: 'жөЈзҠәоқҺеҜ°жҘӢзҙқйҺҙжҲ з…Ўй–¬жҸ¬nжөЈзҠөеҹҚйҺҙжҲқжӮ§й”ӣ?, id: 'Iи·Ҝ06' },
  { type: 'зјҒи·Ёеўқи·ҜжөңжҸ’зҳ‘', color: 'green', prompt: 'й—…еҝҺз©¶йҲҘж–әвӮ¬?, text: 'йҗ—еһ«еўңйҗЁеӢ¬жӨӮйҚҠж¬ҷзҙқ\nжөЈзҠІж№ӘйҺҜе……зІҲж¶”е ¬зҙө', id: 'Iи·Ҝ07' },
  // зјҒи·Ёеўқи·ҜйҸғгғҘзҲ¶
  { type: 'зјҒи·Ёеўқи·ҜйҸғгғҘзҲ¶', color: 'green', prompt: 'й—…еҝҺз©¶ж¶“вӮ¬жө еһӣвӮ¬ж–әвӮ¬?, text: 'жө е©ӮгҒүйҺҙжҲқд»ӣжөңе—•зІҲж¶”е ¬зҙқ\nжөЈзҠіз—…з’Үзҝ зөҫи№ҮеҶ®еҷ·з’ҒйўҒз°Ўж¶“вӮ¬ж¶“е¬¶зҙө', id: 'Dи·Ҝ01' },
  { type: 'зјҒи·Ёеўқи·ҜйҸғгғҘзҲ¶', color: 'green', prompt: 'з’ҮзЈӢоҮ©йҲҘж–әвӮ¬?, text: 'йҚңеұҫеһңйҚҰг„Өз«ҙз’§еҮӨзҙқжөЈзҠіжё¶зҖ№зӯЎnйҸ„ж’із№•з’ҒзүҲжӨӮй—Ӯеӯҳж§ёжө вӮ¬ж¶”е ҹжӨӮйҚҠж¬ҷзҙө', id: 'Dи·Ҝ06' },

let lastIndex = -1;
let isAnimating = false;

function drawCard() {
  if (isAnimating) return;
  isAnimating = true;

  const inner = document.getElementById('cardInner');
  const face = document.getElementById('cardFace');
  const typeLabel = document.getElementById('typeLabel');

  // зјҲиҜІеҡӯйҚҳ?  inner.classList.add('flipping');

  setTimeout(() => {
    // йҺ№гҲ е”ҙзҖ№зҷёзҙҷйҚҰг„§зӮ•жқһоғҝи…‘й–«ж—“зҙқйҗўг„ҰеҹӣйҗӘе¬©з¬үз‘ҷдҫҠзҙҡ
    let idx;
    do { idx = Math.floor(Math.random() * CARDS.length); } while (idx === lastIndex && CARDS.length > 1);
    lastIndex = idx;
    const card = CARDS[idx];
    face.innerHTML = makeCardSVG(card);
    typeLabel.textContent = card.type;

    // зјҲиҜІжҙ–йҸү?    inner.classList.remove('flipping');
    setTimeout(() => { isAnimating = false; }, 560);
  }, 280);
}

  <text x="120" y="174" text-anchor="middle" font-family="serif" font-size="18" fill="${line}">йҸӢ?/text>
  <circle cx="40" cy="40" r="3" fill="${accent}"/>
  <circle cx="200" cy="40" r="3" fill="${accent}"/>
  <circle cx="40" cy="296" r="3" fill="${accent}"/>
  <circle cx="200" cy="296" r="3" fill="${accent}"/>
</svg>`;
}

// duoTurn = иӨ°ж’іеў й‘іеІ„жҪ°йҸҲжҝ…з¬Ӯй”ӣе ҹж®«йҗЁеӢ¶зҙҡй–ӯпҪ…зҙ¶й”ӣеІҖеҒЈзҖ№еҶӘзӮ•йҚ’зүҲо„ңй—Ҳ?let duoTurn = 'purple'; // йҚ’жҝҶоқҗзјҒжҢҺо„ңй—ҲгҲўдј й‘іеІ„жҪ°
let lastGreenIdx = -1, lastPurpleIdx = -1;
let isAnimatingDuo = false;

function startMode(mode) {
  document.getElementById('modeOverlay').style.display = 'none';
  if (mode === 'solo') {
    document.getElementById('soloUI').style.display = 'flex';
    document.getElementById('soloActions').style.display = 'flex';
    document.getElementById('topLabel').textContent = 'жө ?йҸғ?зҖө?з’Ү?;
    drawCard();
  } else {
    document.getElementById('duoUI').style.display = 'flex';
    document.getElementById('duoActions').style.display = 'flex';
    document.getElementById('topLabel').textContent = 'йҚҷ?жөң?зҖө?з’Ү?;
    duoInit();
  }
}

function duoInit() {
  // зјҒи·ЁеўқйҺ¶жҲ’з«ҙеҜ®зӢ…зҙқе§қпҪүжҪ°йҸҲжҝ…з¬Ӯ
  const gPool = GREEN_CARDS;
  let gi = Math.floor(Math.random() * gPool.length);
  lastGreenIdx = gi;
  document.getElementById('faceGreen').innerHTML = makeCardSVG(gPool[gi]);
  document.getElementById('backGreen').innerHTML = makeCardBackSVG('green');
  document.getElementById('innerGreen').className = 'card-inner face-up';

  // з»ұоӮӨеўқйҺ¶жҲ’з«ҙеҜ®зӢ…зҙқй‘іеІ„жҪ°йҸҲжҝ…з¬Ӯ
  const pPool = PURPLE_CARDS;
  let pi = Math.floor(Math.random() * pPool.length);
  lastPurpleIdx = pi;
  document.getElementById('facePurple').innerHTML = makeCardSVG(pPool[pi]);
  document.getElementById('backPurple').innerHTML = makeCardBackSVG('purple');
  document.getElementById('innerPurple').className = 'card-inner face-down';

  duoTurn = 'purple'; // з»ұоӮЈж§ёй‘іеІ„жҪ°й”ӣеІҖз“‘еҜ°е‘°оқҰзјҲ?  updateDuoTurn();
}

function duoDraw(color) {
  if (color !== duoTurn) return; // йҚҷоҒҮе…ҳйҗҗзЎ…е„—й—ҲгҲӨеҒ…еҜ®?  if (isAnimatingDuo) return;
  isAnimatingDuo = true;

  const flipIn = document.getElementById(color === 'green' ? 'innerGreen' : 'innerPurple');
  const flipOut = document.getElementById(color === 'green' ? 'innerPurple' : 'innerGreen');
  const otherColor = color === 'green' ? 'purple' : 'green';

  // зјҲиҜІзҙ‘иӨ°ж’іеў й‘іеІ„жҪ° йҲ«?е§қпҪүжҪ°
  flipIn.classList.add('flipping');
  setTimeout(() => {
    // йҺ№гҲЎжҹҠйҗ—еұҪе”ҙзҖ№?    const pool = color === 'green' ? GREEN_CARDS : PURPLE_CARDS;
    const lastIdx = color === 'green' ? lastGreenIdx : lastPurpleIdx;
    let idx;
    do { idx = Math.floor(Math.random() * pool.length); } while (idx === lastIdx && pool.length > 1);
    if (color === 'green') lastGreenIdx = idx; else lastPurpleIdx = idx;
    document.getElementById(color === 'green' ? 'faceGreen' : 'facePurple').innerHTML = makeCardSVG(pool[idx]);
    flipIn.className = 'card-inner face-up';
    flipIn.classList.remove('flipping');

    // йҚҡеұҫжӨӮзјҲжҳҸжөҶйҚҷпёҝз«ҙеҜ®зҠІеҹҢй‘іеІ„жҪ°
    flipOut.classList.add('flipping');
    setTimeout(() => {
      flipOut.className = 'card-inner face-down';
      flipOut.classList.remove('flipping');
      duoTurn = otherColor;
      updateDuoTurn();
      isAnimatingDuo = false;
    }, 300);
  }, 280);
}

// еҚ•дәәжЁЎејҸ drawCard е·ІеңЁдёҠж–№е®ҡд№үпјҢдёҚиҮӘеҠЁи°ғз”Ё
</script>
