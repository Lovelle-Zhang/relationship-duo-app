<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>关系档案 · 林 Link</title>
<link rel="icon" href="images/lin-dark-logo.png">
<link rel="apple-touch-icon" href="images/lin-dark-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:#0a0f0a;font-family:'Noto Serif SC',serif;color:rgba(255,255,255,.85)}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.page{position:relative;z-index:1;min-height:100vh;padding:60px 24px 80px;max-width:480px;margin:0 auto}
.back{position:fixed;top:28px;left:20px;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.3);cursor:pointer;z-index:10}
.back:hover{color:rgba(255,255,255,.6)}
.top-label{position:fixed;top:32px;left:50%;transform:translateX(-50%);font-size:15px;letter-spacing:4px;color:rgba(255,255,255,.5);white-space:nowrap;z-index:10;font-family:'Noto Serif SC',serif;font-weight:300}
h1{font-size:1.5rem;font-weight:400;letter-spacing:.12em;color:rgba(255,255,255,.75);margin-bottom:6px;margin-top:20px}
.sub{font-size:.72rem;letter-spacing:.08em;color:rgba(255,255,255,.25);margin-bottom:36px}
.search-box{display:flex;gap:10px;margin-bottom:32px}
.search-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;color:rgba(255,255,255,.8);font-family:monospace;font-size:1rem;letter-spacing:.12em;outline:none;transition:border-color .2s}
.search-input::placeholder{color:rgba(255,255,255,.2);font-family:'Noto Serif SC',serif;font-size:.82rem;letter-spacing:.06em}
.search-input:focus{border-color:rgba(120,200,100,.3)}
.search-btn{padding:12px 20px;background:rgba(90,122,90,.25);border:1px solid rgba(90,180,90,.2);border-radius:10px;color:rgba(180,230,140,.8);font-size:.82rem;letter-spacing:.06em;cursor:pointer;white-space:nowrap}
.search-btn:hover{background:rgba(90,122,90,.4)}
.empty{text-align:center;padding:60px 0;color:rgba(255,255,255,.2);font-size:.82rem;letter-spacing:.06em;line-height:2}
.record-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;margin-bottom:14px}
.record-card:hover{border-color:rgba(120,200,100,.15)}
.record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.record-names{font-size:.95rem;letter-spacing:.04em;color:rgba(255,255,255,.75)}
.record-names span{color:rgba(180,230,140,.6);margin:0 6px;font-size:.75rem}
.record-code{font-family:monospace;font-size:.72rem;letter-spacing:.12em;color:rgba(255,255,255,.2)}
.record-meta{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.tag{font-size:.68rem;letter-spacing:.06em;padding:3px 10px;border-radius:99px;border:1px solid}
.tag-done{color:rgba(180,230,140,.6);border-color:rgba(180,230,140,.15);background:rgba(90,180,90,.06)}
.tag-waiting{color:rgba(255,200,100,.5);border-color:rgba(255,200,100,.12);background:rgba(255,180,50,.04)}
.tag-unlocked{color:rgba(200,160,255,.6);border-color:rgba(180,120,255,.15);background:rgba(150,90,255,.06)}
.record-date{font-size:.68rem;color:rgba(255,255,255,.2);letter-spacing:.04em}
.record-actions{display:flex;gap:10px;flex-wrap:wrap}

/* 频率分数条 */
.score-bar-wrap{margin:12px 0 14px;display:flex;flex-direction:column;gap:6px}
.score-bar-row{display:flex;align-items:center;gap:8px}
.score-bar-label{font-size:.62rem;letter-spacing:.06em;color:rgba(255,255,255,.3);width:52px;flex-shrink:0;text-align:right}
.score-bar-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,rgba(90,180,90,.5),rgba(140,220,120,.7));transition:width .6s ease}
.score-bar-val{font-size:.62rem;color:rgba(180,230,140,.5);width:24px;text-align:right;flex-shrink:0}
.score-total{display:flex;align-items:baseline;gap:6px;margin-top:4px}
.score-total-num{font-size:1.4rem;font-weight:300;color:rgba(180,230,140,.75);font-family:'Noto Serif SC',serif;letter-spacing:.04em}
.score-total-label{font-size:.62rem;color:rgba(255,255,255,.25);letter-spacing:.06em}
.btn-view{padding:8px 18px;background:linear-gradient(135deg,rgba(90,122,90,.3),rgba(122,90,122,.3));border:1px solid rgba(120,180,120,.2);border-radius:8px;color:rgba(200,230,180,.8);font-size:.76rem;letter-spacing:.06em;cursor:pointer;font-family:inherit}
.btn-view:hover{background:linear-gradient(135deg,rgba(90,122,90,.5),rgba(122,90,122,.5))}
.btn-retest{padding:8px 18px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.35);font-size:.76rem;letter-spacing:.06em;cursor:pointer;font-family:inherit}
.btn-retest:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.6)}
.record-delete{
  padding:8px 18px;
  background:transparent;
  border:1px solid rgba(200,80,80,.15);
  border-radius:8px;
  color:rgba(255,120,120,.3);
  font-size:.76rem;
  letter-spacing:.06em;
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
}
.record-delete:hover{border-color:rgba(200,80,80,.35);color:rgba(255,120,120,.7)}
.mobile-hint{display:none}
@media(max-width:640px){
  .record-delete{display:none!important}
  .mobile-hint{display:block;margin-top:8px;text-align:center;font-size:.6rem;color:rgba(255,255,255,.12);letter-spacing:.06em}
}

/* 手机端SVG背景 */
#mobile-bg{display:none}
@keyframes pageFadeIn{from{opacity:0}to{opacity:1}}
body{animation:pageFadeIn 0.3s ease-out}

/* 删除确认弹窗（电脑+手机通用） */
.confirm-mask{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:999;
  display:flex;align-items:center;justify-content:center;
  animation:maskIn .3s ease;
}
@keyframes maskIn{from{opacity:0}to{opacity:1}}
.confirm-box{
  background:linear-gradient(145deg,rgba(30,52,40,.85) 0%,rgba(20,38,28,.95) 100%);
  border:1px solid rgba(90,138,106,.15);
  border-radius:24px;
  padding:36px 28px 28px;
  width:300px;
  max-width:90vw;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:boxIn .4s cubic-bezier(.4,0,.2,1);
}
@keyframes boxIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.confirm-box p{
  text-align:center;
  color:#e8f0e8;
  font-size:17px;
  font-weight:500;
  letter-spacing:1.5px;
  margin-bottom:6px;
}
.confirm-sub{
  text-align:center;
  color:#8a9a8a;
  font-size:13px;
  margin-bottom:28px;
  opacity:.7;
  line-height:1.5;
}
.confirm-btns{display:flex;flex-direction:column;gap:12px}
.confirm-btns button{
  width:100%;padding:16px;
  border-radius:14px;
  font-size:15px;letter-spacing:.5px;
  cursor:pointer;font-family:inherit;
  border:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;
}
.confirm-cancel{
  background:linear-gradient(135deg,rgba(90,138,106,.25) 0%,rgba(61,90,74,.3) 100%);
  border:1.5px solid rgba(90,138,106,.4) !important;
  color:#c8e0d8;
  font-weight:500;
}
.confirm-cancel:hover{background:linear-gradient(135deg,rgba(90,138,106,.35) 0%,rgba(61,90,74,.4) 100%)}
.confirm-cancel:active{transform:scale(.97)}
.confirm-ok{
  background:transparent;
  border:1px solid rgba(138,154,138,.2) !important;
  color:#8a9a8a;
  font-size:14px;
}
.confirm-ok:hover{background:rgba(255,255,255,.03)}
.confirm-ok:active{transform:scale(.97)}

@media(max-width:640px){
  canvas{display:none!important}
  #mobile-bg{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:#0d1a14}
  #mobile-bg svg{width:100%;height:100%;position:absolute;bottom:0;left:0}
  .page{padding-top:72px}
  .record-card{border-radius:16px;padding:18px;background:rgba(255,255,255,0.04);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);user-select:none;-webkit-user-select:none;transition:transform .15s,background .15s;cursor:pointer}
  .record-card.pressing{background:rgba(200,80,80,.08);transform:scale(0.98)}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="confirmMask" class="confirm-mask" style="display:none">
  <div class="confirm-box">
    <p>这条记录</p>
    <div class="confirm-sub">将从林中消失</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="confirmResolve(false)">留 下</button>
      <button class="confirm-ok" onclick="confirmResolve(true)">放 手</button>
    </div>
  </div>
</div>

<div id="mobile-bg"><svg viewBox="0 0 390 844" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="ask" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1a14"/><stop offset="100%" style="stop-color:#1a2d24"/></linearGradient><linearGradient id="at1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#3d5a4a;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#1e3428;stop-opacity:0.5"/></linearGradient><linearGradient id="at2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#4a6a5a;stop-opacity:0.45"/><stop offset="100%" style="stop-color:#2d4a3a;stop-opacity:0.65"/></linearGradient><linearGradient id="at3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#5a8a6a;stop-opacity:0.55"/><stop offset="100%" style="stop-color:#3d5a4a;stop-opacity:0.75"/></linearGradient><linearGradient id="afog" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1a14;stop-opacity:0"/><stop offset="100%" style="stop-color:#0d1a14;stop-opacity:0.85"/></linearGradient></defs><rect width="390" height="844" fill="url(#ask)"/><circle cx="80" cy="60" r="1" fill="rgba(232,240,232,0.5)"/><circle cx="200" cy="40" r="1.2" fill="rgba(232,240,232,0.4)"/><circle cx="310" cy="80" r="0.8" fill="rgba(232,240,232,0.6)"/><polygon points="40,844 80,580 120,844" fill="url(#at1)"/><polygon points="160,844 200,560 240,844" fill="url(#at1)"/><polygon points="270,844 310,590 350,844" fill="url(#at1)"/><polygon points="10,844 60,500 110,844" fill="url(#at2)"/><polygon points="140,844 185,480 230,844" fill="url(#at2)"/><polygon points="260,844 310,510 360,844" fill="url(#at2)"/><polygon points="0,844 55,400 110,844" fill="url(#at3)"/><polygon points="130,844 180,380 230,844" fill="url(#at3)"/><polygon points="260,844 315,390 370,844" fill="url(#at3)"/><polygon points="340,844 390,420 440,844" fill="url(#at3)"/><rect x="0" y="680" width="390" height="164" fill="url(#afog)"/></svg></div>
<div class="back" onclick="window.location.href='forest.html'">← lin</div>
<div class="top-label">关 系 档 案</div>
<div class="page">
  <h1>已有的树</h1>
  <div class="sub" id="subText">输入配对码，找回你们的记录</div>
  <div class="search-box">
    <input class="search-input" id="codeInput" placeholder="配对码（6位）" maxlength="6" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')searchRecord()">
    <button class="search-btn" onclick="searchRecord()">查找</button>
  </div>
  <div id="errorMsg"></div>
  <div id="results"></div>
</div>
<script>
const SB='https://esfuazchkbbtccxtamwp.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZnVhemNoa2JidGNjeHRhbXdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTg2ODUsImV4cCI6MjA5MjM3NDY4NX0.xV6Vvv4P0W4ky853yC9OvqOaSAyDErZVTM9UfCUidpQ';
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};

// 本地存储：记住查过的配对码
const STORAGE_KEY='lin_archive_codes';
function getSavedCodes(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}}
function saveCode(code){const codes=getSavedCodes();if(!codes.includes(code)){codes.unshift(code);if(codes.length>10)codes.pop();localStorage.setItem(STORAGE_KEY,JSON.stringify(codes))}}

const urlCode=new URLSearchParams(location.search).get('code');
if(urlCode){document.getElementById('codeInput').value=urlCode.toUpperCase();setTimeout(searchRecord,100)}

// 页面加载时显示历史记录
window.addEventListener('DOMContentLoaded',()=>{
  const saved=getSavedCodes();
  if(saved.length>0){
    document.getElementById('subText').textContent='你的关系记录';
    loadSavedRecords(saved);
  }
});

async function loadSavedRecords(codes){
  const resEl=document.getElementById('results');
  resEl.innerHTML='<div class="loading">加载中...</div>';
  try{
    const all=[];
    for(const code of codes){
      const res=await fetch(SB+'/rest/v1/pairs?code=eq.'+code,{headers:H});
      const data=await res.json();
      if(data&&data.length>0){
        const merged={};
        data.forEach(r=>{
          if(!merged[r.code]){merged[r.code]=Object.assign({},r);merged[r.code].scoresA=null;merged[r.code].scoresB=null;}
          const m=merged[r.code];
          if(!m.user1_name&&r.user1_name)m.user1_name=r.user1_name;
          if(!m.user2_name&&r.user2_name)m.user2_name=r.user2_name;
          if(r.unlocked)m.unlocked=true;
          if(r.status==='paired'||r.status==='complete')m.status=r.status;
          if(r.role==='A'&&r.scores)m.scoresA=r.scores;
          if(r.role==='B'&&r.scores)m.scoresB=r.scores;
        });
        all.push(...Object.values(merged));
      }
    }
    if(all.length>0)renderRecords(all);
    else resEl.innerHTML='<div class="empty">暂无记录</div>';
  }catch(e){resEl.innerHTML=''}
}
async function searchRecord(){
  const code=document.getElementById('codeInput').value.trim().toUpperCase();
  const errEl=document.getElementById('errorMsg');
  const resEl=document.getElementById('results');
  errEl.innerHTML='';
  if(code.length!==6){errEl.innerHTML='<div class="error-msg">请输入6位配对码</div>';return}
  resEl.innerHTML='<div class="loading">查找中...</div>';
  try{
    const res=await fetch(SB+'/rest/v1/pairs?code=eq.'+code,{headers:H});
    const data=await res.json();
    if(!data||data.length===0){resEl.innerHTML='<div class="empty">没有找到这个配对码<br><span style="font-size:.68rem;opacity:.6">请确认配对码是否正确</span></div>';return}
    // 合并同一 code 的两条记录为一条
    const merged={};
    data.forEach(r=>{
      if(!merged[r.code]){merged[r.code]=Object.assign({},r);merged[r.code].scoresA=null;merged[r.code].scoresB=null;}
      const m=merged[r.code];
      if(!m.user1_name&&r.user1_name)m.user1_name=r.user1_name;
      if(!m.user2_name&&r.user2_name)m.user2_name=r.user2_name;
      if(r.unlocked)m.unlocked=true;
      if(r.status==='paired'||r.status==='complete')m.status=r.status;
      if(r.role==='A'&&r.scores)m.scoresA=r.scores;
      if(r.role==='B'&&r.scores)m.scoresB=r.scores;
    });
    renderRecords(Object.values(merged));
    saveCode(code);
  }catch(e){resEl.innerHTML='<div class="error-msg">查找失败，请稍后重试</div>'}
}
function formatDate(s){if(!s)return'';const d=new Date(s);return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')}
function renderScores(sA,sB,nameA,nameB){
  if(!Array.isArray(sA)||sA.length<7)return'';
  const dims=['深度沟通','修复能力','共同体验','价值契合','情绪支持','爱意表达','整体契合'];
  const nA=nameA||'深林';const nB=nameB||'幽兰';
  const bars=dims.map((label,i)=>{
    const a=sA[i]||0,b=sB?sB[i]||0:null;
    const diff=b!==null?Math.abs(a-b):0;
    const isGap=diff>25;
    return '<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
      +'<span style="font-size:.75rem;color:rgba(200,230,200,.7)">'+label+'</span>'
      +(isGap?'<span style="font-size:.62rem;color:rgba(230,160,80,.7)">差距 '+diff+'</span>':'')
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
      +'<div style="width:42px;font-size:.65rem;color:rgba(160,210,160,.55);text-align:right;flex-shrink:0">'+nA+'</div>'
      +'<div style="flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+a+'%;background:#5a7a5a;border-radius:3px"></div></div>'
      +'<div style="width:24px;font-size:.72rem;font-weight:600;color:#5a9a5a;text-align:right">'+a+'</div>'
      +'</div>'
      +(b!==null?'<div style="display:flex;align-items:center;gap:6px">'
      +'<div style="width:42px;font-size:.65rem;color:rgba(180,150,210,.55);text-align:right;flex-shrink:0">'+nB+'</div>'
      +'<div style="flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+b+'%;background:#7a5a7a;border-radius:3px"></div></div>'
      +'<div style="width:24px;font-size:.72rem;font-weight:600;color:#9a7aba;text-align:right">'+b+'</div>'
      +'</div>':'')
      +'</div>';
  }).join('');
  const avgA=Math.round(sA.slice(0,7).reduce((s,v)=>s+v,0)/7);
  const avgB=sB?Math.round(sB.slice(0,7).reduce((s,v)=>s+v,0)/7):null;
  return '<div class="score-bar-wrap" style="padding:14px 0 4px">'+bars
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)">'
    +'<span style="font-size:.68rem;color:rgba(200,220,200,.4)">频率均分</span>'
    +'<span style="font-size:.85rem;font-weight:600;color:rgba(200,230,200,.8)">'
    +'<span style="color:#5a9a5a">'+avgA+'</span>'+(avgB!==null?'<span style="color:rgba(200,220,200,.3);margin:0 4px">·</span><span style="color:#9a7aba">'+avgB+'</span>':'')
    +' <span style="font-size:.65rem;font-weight:400;color:rgba(200,220,200,.3)">/ 100</span></span>'
    +'</div></div>';
}
function renderRecords(records){
  const el=document.getElementById('results');
  el.innerHTML=records.map(r=>{
    const done=r.status==='paired'||r.status==='complete';
    const nA=r.user1_name||'深林'; const nB=r.user2_name||'幽兰';
    const statusTag=done?'<span class="tag tag-done">双方已完成</span>':'<span class="tag tag-waiting">等待对方</span>';
    const unlockedTag=r.unlocked?'<span class="tag tag-unlocked">已解锁</span>':'';
    const scoresHtml=(done||r.unlocked)&&r.scoresA?renderScores(r.scoresA,r.scoresB,nA,nB):'';
    const viewBtn=done?'<button class="btn-view" onclick="viewReport(\''+r.code+'\')">'+( r.unlocked?'查看报告':'解锁报告')+'</button>':'';
    const retestBtn='<button class="btn-retest" onclick="retest(\''+r.code+'\')">重新测试</button>';
    const scoreId='scores-'+r.code;
    const toggleBtn=scoresHtml?'<button class="btn-retest" onclick="toggleScores(\''+scoreId+'\',this)" style="font-size:.7rem">频率对比 ▾</button>':'';
    return '<div class="record-card" oncontextmenu="return false" data-code="'+r.code+'">'
      +'<div class="record-header"><div class="record-names">'+nA+'<span>×</span>'+nB+'</div><div class="record-code">'+r.code+'</div></div>'
      +'<div class="record-meta">'+statusTag+unlockedTag+'<span class="record-date">'+formatDate(r.created_at)+'</span></div>'
      +(scoresHtml?'<div id="'+scoreId+'" style="display:none">'+scoresHtml+'</div>':'')
      +'<div class="record-actions">'+viewBtn+toggleBtn+retestBtn+'<button class="record-delete" title="移除记录">移 除</button></div>'
      +'<div class="mobile-hint">长按删除</div>'
      +'</div>';
  }).join('');
  // 长按删除
  el.querySelectorAll('.record-card').forEach(card=>{
    let timer;
    const press=()=>{card.classList.add('pressing');timer=setTimeout(()=>{card.classList.remove('pressing');deleteRecord(card.dataset.code,card)},700)};
    const cancel=()=>{clearTimeout(timer);card.classList.remove('pressing')};
    card.addEventListener('touchstart',press,{passive:true});
    card.addEventListener('touchend',cancel,{passive:true});
    card.addEventListener('touchmove',cancel,{passive:true});
    card.addEventListener('mousedown',press);
    card.addEventListener('mouseup',cancel);
    card.addEventListener('mouseleave',cancel);
    // 桌面端 hover 删除按钮
    const delBtn = card.querySelector('.record-delete');
    if (delBtn) {
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        clearTimeout(timer);
        card.classList.remove('pressing');
        deleteRecord(card.dataset.code, card);
      });
      delBtn.addEventListener('mousedown', (e) => e.stopPropagation());
    }
  });
}
function toggleScores(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  btn.textContent=open?'频率对比 ▾':'频率对比 ▴';
}
let _confirmResolve=null;
function showConfirm(){return new Promise(r=>{_confirmResolve=r;document.getElementById('confirmMask').style.display='flex'})}
function confirmResolve(v){document.getElementById('confirmMask').style.display='none';if(_confirmResolve){_confirmResolve(v);_confirmResolve=null}}

function deleteRecord(code, el){
  showConfirm().then(ok=>{
    if(!ok)return;
    const codes=getSavedCodes().filter(c=>c!==code);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(codes));
    el.remove();
  });
}
function viewReport(code){window.location.href='index.html?code='+code+'&view=result'}
function retest(code){if(confirm('重新测试会保留原配对码，双方需要重新答题。继续吗？')){window.location.href='index.html?code='+code+'&retest=1'}}
</script>
<script>
const canvas=document.getElementById('bg');const ctx=canvas.getContext('2d');let CW,CH,t=0,trees=[],particles=[];
function resize(){CW=canvas.width=window.innerWidth;CH=canvas.height=window.innerHeight;initBg()}
function initBg(){trees=[];for(let i=0;i<14;i++){trees.push({x:Math.random(),y:.55+Math.random()*.45,h:.12+Math.random()*.22,w:.018+Math.random()*.014,layers:2+Math.floor(Math.random()*2),color:'#0f2010'})}particles=[];for(let i=0;i<25;i++){particles.push({x:Math.random(),y:.3+Math.random()*.6,r:.4+Math.random()*.8,sp:.0002+Math.random()*.0002,ph:Math.random()*Math.PI*2,dr:(Math.random()-.5)*.00008,col:Math.random()>.5?'rgba(180,230,140,':'rgba(140,210,160,'})}}
function drawBg(){t+=.008;ctx.fillStyle='#0a0f0a';ctx.fillRect(0,0,CW,CH);trees.forEach(tr=>{const x=tr.x*CW,bY=tr.y*CH,tH=tr.h*CH,tW=tr.w*Math.min(CW,CH),sw=Math.sin(t*.4+tr.x*10)*1.2;ctx.globalAlpha=.45;ctx.fillStyle=tr.color;ctx.fillRect(x-tW*.08+sw*.3,bY-tH*.18,tW*.16,tH*.2);for(let l=0;l<tr.layers;l++){const p=l/tr.layers,lY=bY-tH*(.15+p*.85),lW=tW*(1-p*.5),lH=tH*.28;ctx.globalAlpha=.4+p*.25;ctx.beginPath();ctx.moveTo(x+sw*(.3+p*.7),lY-lH);ctx.lineTo(x-lW+sw*.2,lY+lH*.3);ctx.lineTo(x+lW+sw*.2,lY+lH*.3);ctx.closePath();ctx.fill()}ctx.globalAlpha=1});particles.forEach(p=>{p.x+=p.dr+Math.sin(t*p.sp*100+p.ph)*.0002;p.y+=Math.cos(t*p.sp*80+p.ph)*.0001;if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0.2)p.y=0.9;if(p.y>0.95)p.y=0.2;const fl=.3+Math.sin(t*1.8+p.ph)*.3;ctx.beginPath();ctx.arc(p.x*CW,p.y*CH,p.r,0,Math.PI*2);ctx.fillStyle=p.col+fl+')';ctx.fill()});requestAnimationFrame(drawBg)}
window.addEventListener('resize',resize);resize();drawBg();
</script>
