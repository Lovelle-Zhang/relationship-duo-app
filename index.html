<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关系双人组 - 配对</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status.waiting {
            background: #fff3cd;
            color: #856404;
        }

        .status.paired {
            background: #d4edda;
            color: #155724;
        }

        .code-display {
            text-align: center;
            margin: 20px 0;
        }

        .code {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }

        .input-group {
            margin: 20px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .partner-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .partner-info p {
            margin: 5px 0;
            color: #333;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>关系双人组</h1>
        <p class="subtitle">跨设备配对系统</p>

        <div id="app">
            <!-- 初始状态：选择角色 -->
            <div id="role-selection">
                <button onclick="createPair()">我先来，生成配对码</button>
                <div class="divider">或</div>
                <div class="input-group">
                    <label>输入对方的配对码</label>
                    <input type="text" id="join-code" placeholder="例如：ABC123" maxlength="6">
                </div>
                <button onclick="joinPair()">加入配对</button>
            </div>

            <!-- 等待配对 -->
            <div id="waiting-state" style="display:none;">
                <div class="status waiting">
                    等待对方加入...
                </div>
                <div class="code-display">
                    <div class="code" id="my-code"></div>
                </div>
                <p style="text-align:center; color:#666; margin-top:10px;">
                    把这个码发给对方
                </p>
                <div class="loading">
                    <p>⏳ 自动检测中...</p>
                </div>
            </div>

            <!-- 配对成功 -->
            <div id="paired-state" style="display:none;">
                <div class="status paired">
                    ✓ 配对成功！
                </div>
                <div class="partner-info">
                    <p><strong>对方昵称：</strong><span id="partner-name"></span></p>
                    <p><strong>配对时间：</strong><span id="pair-time"></span></p>
                </div>
                <button onclick="location.reload()">重新配对</button>
            </div>

            <!-- 错误提示 -->
            <div id="error-msg" class="error" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://relationship-duo-app-yy.vercel.app/api'; // 绝对路径
        let checkInterval = null;

        // 生成配对码
        async function createPair() {
            const nickname = prompt('请输入你的昵称：');
            if (!nickname) return;

            try {
                const res = await fetch(`${API_BASE}/pair`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'create', nickname })
                });

                const data = await res.json();
                if (data.code) {
                    document.getElementById('my-code').textContent = data.code;
                    showState('waiting');
                    startChecking(data.code);
                } else {
                    showError(data.error || '创建失败');
                }
            } catch (err) {
                showError('网络错误：' + err.message);
            }
        }

        // 加入配对
        async function joinPair() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (!code) {
                showError('请输入配对码');
                return;
            }

            const nickname = prompt('请输入你的昵称：');
            if (!nickname) return;

            try {
                const res = await fetch(`${API_BASE}/pair`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'join', code, nickname })
                });

                const data = await res.json();
                if (data.success) {
                    showPaired(data.partner, data.paired_at);
                } else {
                    showError(data.error || '加入失败');
                }
            } catch (err) {
                showError('网络错误：' + err.message);
            }
        }

        // 轮询检查配对状态
        function startChecking(code) {
            checkInterval = setInterval(async () => {
                try {

                    const data = await res.json();
