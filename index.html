<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系显影剂 · 双人版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#c45c6a;--coral:#e8806e;--purple:#8b6ec8;--ink:#2e1f1f;--mid:#7a5252;--faint:#b8938a}
body{font-family:'Noto Serif SC',serif;min-height:100vh;background:linear-gradient(160deg,#fef8f3,#fdf0ec,#fef5f0);display:flex;align-items:center;justify-content:center;padding:28px 20px;position:relative;overflow-x:hidden}
body::before,body::after{content:'';position:fixed;border-radius:60% 40% 70% 30%/50% 60% 40% 50%;pointer-events:none}
body::before{width:340px;height:280px;top:-60px;right:-80px;background:radial-gradient(ellipse,rgba(248,180,170,.18),transparent 65%)}
body::after{width:220px;height:180px;bottom:30px;left:-50px;background:radial-gradient(ellipse,rgba(139,110,200,.08),transparent 65%)}
.wrap{width:100%;max-width:440px;position:relative;z-index:1}
.screen{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.1)}30%{transform:scale(1)}45%{transform:scale(1.05)}}
@keyframes optIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.flower-wrap{width:80px;height:80px;margin:0 auto 20px;position:relative;display:flex;align-items:center;justify-content:center}
.flower-glow{position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(232,128,110,.2),transparent 70%);animation:glowPulse 3s ease-in-out infinite}
.flower-emoji{font-size:52px;display:block;animation:floatBob 4s ease-in-out infinite;position:relative;z-index:1}
.eyebrow{font-size:.75rem;letter-spacing:.18em;color:var(--faint);text-align:center;margin-bottom:10px;font-weight:300}
.title{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:400;color:var(--ink);text-align:center;line-height:1.22;margin-bottom:16px}
.intro-text{font-size:.92rem;color:var(--mid);text-align:center;line-height:2;font-weight:300;margin-bottom:24px}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(196,92,106,.2),transparent)}
.div-dot{font-size:.65rem;color:var(--rose);opacity:.5}
.btn-main{display:block;width:100%;padding:16px 0;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;border-radius:14px;color:#fff;font-family:'Noto Serif SC',serif;font-size:1rem;font-weight:600;letter-spacing:.12em;cursor:pointer;box-shadow:0 8px 28px rgba(196,92,106,.28);margin-bottom:16px;transition:all .2s}
.btn-main:hover{filter:brightness(1.05);transform:translateY(-1px)}
.hint{font-size:.72rem;color:var(--faint);text-align:center;letter-spacing:.06em}
.or-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.or-line{flex:1;height:1px;background:rgba(196,92,106,.12)}
.or-txt{font-size:.75rem;color:var(--faint)}
.join-row{display:flex;gap:8px;margin-bottom:6px}
.code-input{flex:1;padding:12px 14px;background:rgba(255,255,255,.7);border:1.5px solid rgba(196,92,106,.18);border-radius:12px;font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--ink);outline:none;letter-spacing:.18em;text-transform:uppercase}
.code-input:focus{border-color:rgba(196,92,106,.4)}
.btn-join{padding:12px 20px;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;border-radius:12px;color:#fff;font-family:'Noto Serif SC',serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.error-txt{font-size:.78rem;color:var(--rose);text-align:center;min-height:20px;margin-bottom:4px}
.role-tag{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:.75rem;color:var(--faint);letter-spacing:.08em}
.role-dot{width:8px;height:8px;border-radius:50%}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.progress-track{flex:1;height:3px;background:rgba(196,92,106,.12);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(232,128,110,.7),var(--rose));border-radius:99px;transition:width .5s}
.progress-num{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--faint)}
.q-box{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(196,92,106,.1)}
.q-label{font-size:.68rem;letter-spacing:.22em;color:var(--rose);opacity:.6;margin-bottom:10px;font-family:'Playfair Display',serif}
.q-text{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--ink);line-height:1.5;margin-bottom:6px}
.q-sub{font-size:.78rem;color:var(--faint);font-weight:300}
.slider-wrap{padding:8px 0 28px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;outline:none;cursor:pointer;margin-bottom:16px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--rose));box-shadow:0 2px 8px rgba(196,92,106,.4);cursor:pointer}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;cursor:pointer}
.slider-val{text-align:center}
.slider-num{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:600;color:var(--rose)}
.slider-num.purple{color:var(--purple)}
.slider-unit{font-size:1rem;color:var(--mid);font-weight:300}
.opt-list{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.opt{display:flex;align-items:center;gap:13px;padding:13px 16px;background:rgba(255,255,255,.7);border:1.5px solid rgba(196,92,106,.12);border-radius:12px;cursor:pointer;text-align:left;font-family:'Noto Serif SC',serif;animation:optIn .35s ease both;width:100%;transition:all .2s}
.opt:hover{border-color:rgba(196,92,106,.3)}
.opt.sel-a{background:rgba(252,236,234,.95);border-color:rgba(196,92,106,.4)}
.opt.sel-b{background:rgba(240,235,252,.95);border-color:rgba(139,110,200,.4)}
.opt-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(196,92,106,.3);flex-shrink:0;transition:all .2s}
.opt.sel-a .opt-radio{background:var(--rose);border-color:var(--rose);box-shadow:0 0 0 3px rgba(196,92,106,.15)}
.opt.sel-b .opt-radio{background:var(--purple);border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,110,200,.15)}
.opt-txt{font-size:.88rem;color:var(--mid);font-weight:300;flex:1;line-height:1.5}
.opt.sel-a .opt-txt{color:#b84d5a}
.opt.sel-b .opt-txt{color:#6a4ea0}
.nav-row{display:flex;gap:10px;margin-top:24px}
.btn-back{padding:12px 18px;background:transparent;border:1.5px solid rgba(196,92,106,.2);border-radius:12px;color:var(--faint);font-family:'Noto Serif SC',serif;font-size:.85rem;cursor:pointer}
.btn-next{flex:1;padding:14px 0;border:none;border-radius:12px;color:#fff;font-family:'Noto Serif SC',serif;font-size:.95rem;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(196,92,106,.25);transition:all .2s}
.btn-next:disabled{opacity:.6;cursor:not-allowed}
.btn-next.rose{background:linear-gradient(135deg,var(--coral),var(--rose))}
.btn-next.purple{background:linear-gradient(135deg,#a07ed0,var(--purple))}
.ml-auto{margin-left:auto}
.code-card{background:linear-gradient(145deg,#fce8e4,#fdeee4);border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:20px;box-shadow:0 8px 28px rgba(196,92,106,.1)}
.code-label{font-size:.75rem;letter-spacing:.15em;color:var(--faint);margin-bottom:12px}
.code-big{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:600;color:var(--rose);letter-spacing:.25em;margin-bottom:10px}
.code-share{display:flex;gap:8px;margin-top:16px}
.btn-copy{flex:1;padding:11px 0;background:rgba(196,92,106,.1);border:1px solid rgba(196,92,106,.2);border-radius:10px;color:var(--rose);font-family:'Noto Serif SC',serif;font-size:.85rem;cursor:pointer}
.code-hint{font-size:.78rem;color:var(--faint);margin-top:12px}
.score-card{background:linear-gradient(145deg,#fce8e4,#fdeee4,#fdf5e8);border-radius:20px;padding:24px 24px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(196,92,106,.1)}
.score-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,128,110,.15),transparent 60%);pointer-events:none}
.score-sub{font-size:.75rem;letter-spacing:.15em;color:var(--faint);margin-bottom:8px;position:relative;z-index:1}
.score-num{font-family:'Playfair Display',serif;font-size:5rem;font-weight:600;color:var(--rose);line-height:1;position:relative;z-index:1;animation:heartbeat 2.5s ease-in-out infinite}
.score-denom{font-size:1rem;color:var(--faint);margin-bottom:14px;position:relative;z-index:1}
.score-badge{display:inline-block;background:rgba(196,92,106,.1);border:1px solid rgba(196,92,106,.2);border-radius:99px;padding:5px 16px;font-size:.8rem;color:var(--rose);position:relative;z-index:1}
.tabs{display:flex;gap:6px;margin-bottom:16px;background:rgba(196,92,106,.06);border-radius:12px;padding:4px}
.tab{flex:1;padding:9px 0;background:transparent;border:none;border-radius:10px;color:var(--faint);font-family:'Noto Serif SC',serif;font-size:.8rem;cursor:pointer;transition:all .2s}
.tab.active{background:white;color:var(--rose);font-weight:600;box-shadow:0 2px 8px rgba(196,92,106,.1)}
.tab-panel{display:none}.tab-panel.active{display:block}
.legend-row{display:flex;justify-content:center;gap:20px;margin-bottom:14px}
.legend-a,.legend-b{font-size:.78rem}
.legend-a{color:var(--rose)}.legend-b{color:var(--purple)}
.profile-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.profile-card{flex:1;background:rgba(255,255,255,.7);border-radius:14px;padding:14px 12px;text-align:center;border:1px solid rgba(196,92,106,.1)}
.profile-divider{font-size:.8rem;color:var(--faint);font-weight:600}
.profile-level{font-size:.75rem;letter-spacing:.1em;font-weight:600;margin-top:6px;margin-bottom:2px}
.profile-score{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:var(--mid)}
.compare-card{background:rgba(255,255,255,.7);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(196,92,106,.08)}
.compare-card.good{border-color:rgba(80,180,100,.25);background:rgba(240,255,240,.6)}
.compare-card.warn{border-color:rgba(230,140,60,.25);background:rgba(255,248,235,.6)}
.compare-header{display:flex;justify-content:space-between;margin-bottom:8px}
.compare-dim{font-size:.82rem;color:var(--ink)}
.tag-green{font-size:.7rem;background:rgba(80,180,100,.12);color:#2e8040;border-radius:99px;padding:2px 10px;border:1px solid rgba(80,180,100,.2)}
.tag-orange{font-size:.7rem;background:rgba(230,140,60,.12);color:#b06010;border-radius:99px;padding:2px 10px;border:1px solid rgba(230,140,60,.2)}
.compare-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.compare-bar-track{flex:1;height:6px;background:rgba(196,92,106,.08);border-radius:99px;overflow:hidden}
.compare-bar-fill{height:100%;border-radius:99px;transition:width .6s}
.compare-score{font-size:.75rem;font-weight:600;min-width:28px;text-align:right}
.diff-text{font-size:.7rem;color:var(--faint);text-align:right;margin-top:2px}
.insight-block{background:rgba(255,255,255,.7);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid rgba(196,92,106,.08)}
.insight-title{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:6px}
.insight-sub{font-size:.82rem;color:var(--mid);font-weight:300;line-height:1.7;margin-bottom:10px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-green-big{background:rgba(80,180,100,.1);color:#2e8040;border-radius:99px;padding:5px 14px;font-size:.8rem;border:1px solid rgba(80,180,100,.2)}
.blind-card{background:rgba(255,248,235,.8);border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(230,140,60,.2)}
.blind-header{display:flex;justify-content:space-between;margin-bottom:4px}
.blind-dim{font-size:.82rem;font-weight:600;color:var(--ink)}
.blind-diff{font-size:.75rem;color:#b06010}
.blind-tip{font-size:.8rem;color:var(--mid);font-weight:300;line-height:1.7}
.final-card{background:linear-gradient(145deg,#fce8e4,#fdeee4);border-radius:16px;padding:20px;margin-top:4px}
.final-title{font-size:.75rem;letter-spacing:.15em;color:var(--faint);margin-bottom:12px;text-align:center}
.final-duration{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;text-align:center;margin-bottom:8px}
.final-analysis{font-size:.86rem;color:var(--mid);line-height:1.9;font-weight:300;margin-bottom:12px}
.advice-box{background:rgba(255,255,255,.5);border-radius:10px;padding:12px 14px;border-left:3px solid rgba(200,150,74,.5)}
.advice-text{font-size:.84rem;color:#7a5a3a;line-height:1.8;font-weight:300}
.share-hint{text-align:center;font-size:.8rem;color:var(--faint);margin:16px 0 10px;font-style:italic}
.btn-ghost{display:block;width:100%;padding:13px 0;background:transparent;border:1.5px solid rgba(196,92,106,.22);border-radius:12px;color:var(--rose);font-family:'Noto Serif SC',serif;font-size:.9rem;cursor:pointer}
.locked-overlay{position:relative;filter:blur(8px);pointer-events:none;user-select:none}
.unlock-card{background:linear-gradient(145deg,rgba(252,232,228,.95),rgba(253,238,228,.95));border-radius:20px;padding:32px 24px;text-align:center;margin:-280px auto 20px;position:relative;z-index:10;max-width:360px;box-shadow:0 12px 48px rgba(196,92,106,.2)}
.unlock-icon{font-size:48px;margin-bottom:16px}
.unlock-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600;color:var(--ink);margin-bottom:12px}
.unlock-desc{font-size:.88rem;color:var(--mid);line-height:1.8;margin-bottom:8px}
.unlock-features{text-align:left;margin:20px 0;padding:20px;background:rgba(255,255,255,.6);border-radius:12px}
.unlock-feature{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;font-size:.85rem;color:var(--ink)}
.unlock-feature:last-child{margin-bottom:0}
.unlock-check{color:var(--rose);font-weight:600;flex-shrink:0}
.unlock-price{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:600;color:var(--rose);margin:16px 0 8px}
.unlock-price-note{font-size:.75rem;color:var(--faint);margin-bottom:20px}
.btn-unlock{display:block;width:100%;padding:16px 0;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;border-radius:14px;color:#fff;font-family:'Noto Serif SC',serif;font-size:1.05rem;font-weight:600;letter-spacing:.12em;cursor:pointer;box-shadow:0 8px 28px rgba(196,92,106,.35);transition:all .2s}
.btn-unlock:hover{filter:brightness(1.08);transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
<div id="intro" class="screen">
<div class="flower-wrap"><div class="flower-glow"></div><span class="flower-emoji">🌸</span></div>
<p class="eyebrow">关系显影剂 · 双人版</p>
<h1 class="title">你们的关系<br>有多深？</h1>
<p class="intro-text">不是一个人的自我认知，<br>而是两个人的关系显影。</p>
<div class="divider"><div class="div-line"></div><span class="div-dot">✦</span><div class="div-line"></div></div>
<button class="btn-main" onclick="startA()">我来发起测试</button>
<div class="or-row"><div class="or-line"></div><span class="or-txt">或者</span><div class="or-line"></div></div>
<div class="join-row">
<input class="code-input" id="ci" placeholder="输入邀请码" maxlength="6" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')joinB()">
<button class="btn-join" onclick="joinB()">进入 →</button>
</div>
<p class="error-txt" id="err"></p>
<p class="hint" style="margin-top:12px">基于关系心理学 · 7 题 · 双人对比报告</p>
</div>

<div id="quiz" class="screen hidden">
<div class="role-tag"><span class="role-dot" id="rd"></span><span id="rl"></span></div>
<div class="progress-row"><div class="progress-track"><div class="progress-fill" id="pb"></div></div><span class="progress-num" id="pn"></span></div>
<div class="q-box"><p class="q-label" id="ql"></p><p class="q-text" id="qt"></p><p class="q-sub" id="qs"></p></div>
<div id="sa" class="slider-wrap hidden">
<input type="range" id="slider" oninput="onSlide(this.value)">
<div class="slider-val"><span class="slider-num" id="sn">0</span><span class="slider-unit" id="su"></span></div>
</div>
<div id="ca" class="opt-list hidden"></div>
<div class="nav-row">
<button class="btn-back hidden" id="bb" onclick="goBack()">← 上一题</button>
<button class="btn-next rose ml-auto" id="bn" onclick="goNext()">下一题 →</button>
</div>
</div>

<div id="waiting" class="screen hidden" style="text-align:center">
<div style="font-size:52px;margin-bottom:20px;animation:floatBob 3s ease-in-out infinite">⏳</div>
<p class="eyebrow">等待另一半</p>
<h2 class="title" style="font-size:1.8rem">你已完成测试</h2>
<p class="intro-text">把邀请码发给另一半<br>TA 完成后报告自动解锁</p>
<div class="code-card">
<p class="code-label">邀请码</p>
<div class="code-big" id="show-code"></div>
<div class="code-share">
<button class="btn-copy" onclick="copyCode()">📋 复制邀请码</button>
<button class="btn-copy" onclick="copyLink()">🔗 复制链接</button>
</div>
<p class="code-hint">让另一半在首页输入此码</p>
</div>
<p style="font-size:.75rem;color:var(--faint);margin-top:12px">TA 完成后页面会自动跳转</p>
</div>

<div id="result" class="screen hidden">
<div class="score-card">
<div class="score-glow"></div>
<p class="score-sub">关系契合度</p>
<div class="score-num" id="rs">0</div>
<div class="score-denom">/100</div>
<div class="score-badge" id="rb"></div>
</div>
<div class="tabs">
<button class="tab active" onclick="switchTab('radar')">雷达图</button>
<button class="tab" onclick="switchTab('compare')">逐题对比</button>
<button class="tab" onclick="switchTab('insight')">关系洞察</button>
</div>
<div id="tab-radar" class="tab-panel active">
<div style="display:flex;justify-content:center;margin-bottom:16px"><svg id="radar" width="240" height="240" style="overflow:visible"></svg></div>
<div class="legend-row"><span class="legend-a">── 发起方</span><span class="legend-b">── 受邀方</span></div>
<div class="profile-row">
<div class="profile-card"><span id="pa-e" style="font-size:28px"></span><p class="profile-level" id="pa-l"></p><p class="profile-score" id="pa-s"></p></div>
<div class="profile-divider">VS</div>
<div class="profile-card"><span id="pb-e" style="font-size:28px"></span><p class="profile-level" id="pb-l" style="color:var(--purple)"></p><p class="profile-score" id="pb-s"></p></div>
</div>
</div>
<div id="tab-compare" class="tab-panel"></div>
<div id="tab-insight" class="tab-panel"></div>
<p class="share-hint">📸 截图分享你们的关系报告？</p>
<button class="btn-ghost" onclick="location.reload()">重新测试 ↺</button>
</div>
</div>
<script>
const SB='https://esfuazchkbbtccxtamwp.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZnVhemNoa2JidGNjeHRhbXdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTg2ODUsImV4cCI6MjA5MjM3NDY4NX0.xV6Vvv4P0W4ky853yC9OvqOaSAyDErZVTM9UfCUidpQ';
const DIMS=["深度沟通","修复能力","共同体验","价值契合","情绪支持","爱意表达","整体满意"];
const QS=[
{t:"slider",text:"你们每天深度聊天多久？",sub:"感受、想法、梦想——不是聊琐事",min:0,max:120,step:5,unit:"分钟",def:0,fn:v=>Math.round(v/120*100)},
{t:"choice",text:"吵架后通常多久和好？",opts:[["当天就好",100],["1–2 天",72],["3–7 天",40],["超过一周",8]]},
{t:"slider",text:"过去一个月一起做了几次新鲜事？",sub:"去没去过的地方、尝试新活动……",min:0,max:20,step:1,unit:"次",def:0,fn:v=>Math.round(v/20*100)},
{t:"slider",text:"核心话题上观点有多一致？",sub:"金钱观、生活方式、未来规划",min:0,max:100,step:5,unit:"%",def:0,fn:v=>v},
{t:"choice",text:"遇到困难时，对方会：",opts:[["第一时间安慰支持我",100],["会听但未必能帮",68],["有时听有时忽略",32],["很少关注我情绪",8]]},
{t:"choice",text:"上次认真表达爱意或感谢是多久前？",opts:[["今天或昨天",100],["这周以内",72],["这个月以内",40],["记不清了",8]]},
{t:"slider",text:"你对这段关系的满意度？",sub:"直觉打分，不用想太多",min:0,max:100,step:1,unit:"%",def:0,fn:v=>v}
];
const PROF=[[88,"灵魂伴侣","💍","#c45c6a","一辈子 ♾️","在最关键的每一个维度你们都做到了，这不靠运气，靠的是两个人持续用心的选择。","偶尔停下来，认真告诉对方：有你在，我觉得很幸运。"],[73,"深度伴侣","🌸","#c45c6a","20–40 年","扎实的情感基础，沟通质量和相互支持都处于很好的水准。","定期问对方：最近有什么想说但还没说的？"],[55,"稳定伴侣","🌻","#d4844a","10–20 年","稳定基础不错，但新鲜感、深度对话、情感表达都可以再多一点。","这个月约一次「假装第一次约会」。"],[38,"磨合中","🌤️","#b07830","5–10 年","核心议题还有明显提升空间。现在投入，收益很大。","选一个一直回避的话题，这周聊一次。"],[0,"需要重建","🌱","#8a6a3a","需要努力","距离大于连结，多个维度都在发出需要关注的信号。","今天就做一件小事：告诉对方你欣赏 TA 的一点。"]];
const TIPS={"深度沟通":"试试每周定一个「无手机聊天时间」，哪怕15分钟。","修复能力":"下次争吵后，先说「我感到…」而不是「你总是…」。","共同体验":"这个月一起做一件从没做过的事。","价值契合":"各自写下「五年后理想生活」，然后互相分享。","情绪支持":"在对方低落时先问「你需要倾听还是建议？」","爱意表达":"今天认真告诉对方你欣赏 TA 的一点。","整体满意":"聊聊：这段关系里最需要改善什么？"};

function gp(s){const p=PROF.find(x=>s>=x[0])||PROF[4];return{level:p[1],emoji:p[2],color:p[3],dur:p[4],ana:p[5],adv:p[6]}}
function avg(a){return Math.round(a.reduce((x,y)=>x+y,0)/a.length)}
function mkCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function toScores(ans){return QS.map((q,i)=>{const v=ans[i];if(v==null)return 0;return q.t==="slider"?q.fn(v):v})}

const H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK};
async function dbRead(code,role){
const r=await fetch(SB+'/rest/v1/pairs?code=eq.'+code+'&role=eq.'+role+'&select=scores&limit=1',{headers:H});
const d=await r.json();
return Array.isArray(d)&&d.length?d[0].scores:null;
}
async function dbWrite(code,role,scores){
await fetch(SB+'/rest/v1/pairs',{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({code,role,scores})});
}

let R,C,qi=0,ans=[],sv=0,myS,theirS,pollTimer;

function show(id){['intro','quiz','waiting','result'].forEach(s=>document.getElementById(s).classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}
function err(m){const e=document.getElementById('err');e.textContent=m;setTimeout(()=>e.textContent='',3000)}

function startA(){
R='A';C=mkCode();ans=Array(QS.length).fill(null);qi=0;sv=0;
document.getElementById('rd').style.background='#c45c6a';
document.getElementById('rl').textContent='发起方 · 玫瑰色';
document.getElementById('bn').className='btn-next rose ml-auto';
show('quiz');renderQ();
}

async function joinB(){
const c=document.getElementById('ci').value.trim().toUpperCase();
if(c.length<6){err('请输入完整的 6 位邀请码');return}
const aa=await dbRead(c,'A');
if(!aa){err('找不到这个邀请码');return}
const ba=await dbRead(c,'B');
if(ba){R='A';C=c;myS=aa;theirS=ba;renderResult();return}
R='B';C=c;ans=Array(QS.length).fill(null);qi=0;sv=0;
document.getElementById('rd').style.background='#8b6ec8';
document.getElementById('rl').textContent='受邀方 · 蓝紫色';
document.getElementById('bn').className='btn-next purple ml-auto';
show('quiz');renderQ();
}

function renderQ(){
const q=QS[qi],pct=Math.round(qi/QS.length*100);
document.getElementById('pb').style.width=pct+'%';
document.getElementById('pn').innerHTML=(qi+1)+'<span style="opacity:.4">/'+QS.length+'</span>';
document.getElementById('ql').textContent='Q '+String(qi+1).padStart(2,'0');
document.getElementById('qt').textContent=q.text;
document.getElementById('qs').textContent=q.sub||'';
document.getElementById('bb').classList.toggle('hidden',qi===0);
const nb=document.getElementById('bn');nb.classList.toggle('ml-auto',qi===0);
nb.textContent=qi===QS.length-1?'完成 →':'下一题 →';nb.disabled=false;
if(q.t==='slider'){
document.getElementById('sa').classList.remove('hidden');
document.getElementById('ca').classList.add('hidden');
const s=document.getElementById('slider');s.min=q.min;s.max=q.max;s.step=q.step;
const v=ans[qi]!=null?ans[qi]:q.def;s.value=sv=v;
document.getElementById('sn').textContent=v;
document.getElementById('sn').className='slider-num'+(R==='B'?' purple':'');
document.getElementById('su').textContent=' '+q.unit;
updTrack(v,q.min,q.max);
}else{
document.getElementById('sa').classList.add('hidden');
const area=document.getElementById('ca');area.classList.remove('hidden');area.innerHTML='';
const cls=R==='B'?'sel-b':'sel-a';
q.opts.forEach(([txt,sc],i)=>{
const b=document.createElement('button');
b.className='opt'+(ans[qi]===sc?' '+cls:'');b.style.animationDelay=i*.06+'s';
b.innerHTML='<span class="opt-radio"></span><span class="opt-txt">'+txt+'</span>';
b.onclick=()=>{ans[qi]=sc;area.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel-a','sel-b'));b.classList.add(cls)};
area.appendChild(b);
});
}
}
function onSlide(v){sv=+v;document.getElementById('sn').textContent=v;updTrack(v,QS[qi].min,QS[qi].max)}
function updTrack(v,mn,mx){const p=((v-mn)/(mx-mn))*100;document.getElementById('slider').style.background='linear-gradient(to right,'+(R==='B'?'#8b6ec8':'#c45c6a')+' '+p+'%,rgba(196,92,106,.15) '+p+'%)'}
function goBack(){if(qi>0){qi--;sv=ans[qi]??QS[qi].def??0;renderQ()}}

async function goNext(){
const q=QS[qi];
if(q.t==='slider')ans[qi]=sv;
else if(ans[qi]==null)return;
if(qi<QS.length-1){qi++;sv=QS[qi].def||0;renderQ();return}
myS=toScores(ans);
const nb=document.getElementById('bn');nb.disabled=true;nb.textContent='提交中…';
await dbWrite(C,R,myS);
if(R==='A'){
document.getElementById('show-code').textContent=C;
show('waiting');
pollTimer=setInterval(async()=>{
const b=await dbRead(C,'B');
if(b){clearInterval(pollTimer);theirS=b;renderResult()}
},3000);
}else{
theirS=await dbRead(C,'A');
renderResult();
}
}

function copyCode(){navigator.clipboard.writeText(C).then(()=>alert('邀请码已复制：'+C))}
function copyLink(){navigator.clipboard.writeText(location.origin+location.pathname+'?code='+C).then(()=>alert('链接已复制！'))}

function renderResult(){
const sA=R==='A'?myS:theirS,sB=R==='A'?theirS:myS;
const tA=avg(sA),tB=avg(sB),combined=avg(sA.map((a,i)=>Math.round((a+sB[i])/2)));
const pct=Math.min(99,Math.round(combined*.91+Math.sin(combined)*3));
const pA=gp(tA),pB=gp(tB),pC=gp(combined);
let n=0;const el=document.getElementById('rs');
const ti=setInterval(()=>{n=Math.min(combined,n+Math.ceil(combined/30));el.textContent=n;if(n>=combined)clearInterval(ti)},40);
document.getElementById('rb').textContent='超越了 '+pct+'% 的情侣';
document.getElementById('pa-e').textContent=pA.emoji;document.getElementById('pa-l').textContent=pA.level;document.getElementById('pa-l').style.color=pA.color;document.getElementById('pa-s').textContent=tA+'分';
document.getElementById('pb-e').textContent=pB.emoji;document.getElementById('pb-l').textContent=pB.level;document.getElementById('pb-s').textContent=tB+'分';
drawRadar(sA,sB,240);
const cmp=document.getElementById('tab-compare');cmp.innerHTML='';
DIMS.forEach((dim,i)=>{
const a=sA[i],b=sB[i],d=Math.abs(a-b),g=d<=20,w=d>35;
const c=document.createElement('div');c.className='compare-card'+(g?' good':w?' warn':'');
c.innerHTML='<div class="compare-header"><span class="compare-dim">'+dim+'</span>'+(g?'<span class="tag-green">共识 ✓</span>':w?'<span class="tag-orange">差异 !</span>':'')+'</div><div class="compare-bar"><div class="compare-bar-track"><div class="compare-bar-fill" style="width:'+a+'%;background:#c45c6a"></div></div><span class="compare-score" style="color:#c45c6a">'+a+'</span></div><div class="compare-bar"><div class="compare-bar-track"><div class="compare-bar-fill" style="width:'+b+'%;background:#8b6ec8"></div></div><span class="compare-score" style="color:#8b6ec8">'+b+'</span></div>'+(d?'<p class="diff-text">差值 '+d+' 分</p>':'');
cmp.appendChild(c);
});
const ins=document.getElementById('tab-insight');
const diffs=DIMS.map((d,i)=>({d,a:sA[i],b:sB[i],df:Math.abs(sA[i]-sB[i])}));
const con=diffs.filter(x=>x.df<=20),bld=diffs.filter(x=>x.df>35).sort((a,b)=>b.df-a.df);
const sur=[...diffs].sort((a,b)=>Math.abs(b.b-b.a)-Math.abs(a.b-a.a))[0];
let h='';
if(con.length)h+='<div class="insight-block"><p class="insight-title">✅ 共识区</p><p class="insight-sub">你们在以下维度高度一致</p><div class="tag-cloud">'+con.map(x=>'<span class="tag-green-big">'+x.d+'</span>').join('')+'</div></div>';
if(bld.length)h+='<div class="insight-block"><p class="insight-title">⚠️ 盲区</p><p class="insight-sub">这些维度差异明显，值得好好聊</p>'+bld.slice(0,3).map(x=>'<div class="blind-card"><div class="blind-header"><span class="blind-dim">'+x.d+'</span><span class="blind-diff">差 '+x.df+' 分</span></div><p class="blind-tip">'+(TIPS[x.d]||'')+'</p></div>').join('')+'</div>';
if(sur&&Math.abs(sur.b-sur.a)>20)h+='<div class="insight-block"><p class="insight-title">💡 惊喜发现</p><p class="insight-sub">在「'+sur.d+'」上，'+(sur.b>sur.a?'受邀方':'发起方')+'的投入比对方预想的高出 '+Math.abs(sur.b-sur.a)+' 分。</p></div>';
h+='<div class="final-card"><p class="final-title">你们的婚姻预测</p><div class="divider"><div class="div-line"></div><span class="div-dot">✦</span><div class="div-line"></div></div><p class="final-duration" style="color:'+pC.color+'">'+pC.dur+'</p><p class="final-analysis">'+pC.ana+'</p><div class="advice-box"><p class="advice-text">✨ '+pC.adv+'</p></div></div>';
ins.innerHTML=h;
show('result');
}

function switchTab(n){
document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['radar','compare','insight'][i]===n));
document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
document.getElementById('tab-'+n).classList.add('active');
}

function drawRadar(sA,sB,sz){
const svg=document.getElementById('radar');svg.setAttribute('width',sz);svg.setAttribute('height',sz);
const cx=sz/2,cy=sz/2,r=sz*.36,n=DIMS.length;
const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
const pt=(s,i)=>{const a=ang(i),d=r*s/100;return[cx+d*Math.cos(a),cy+d*Math.sin(a)]};
const poly=s=>s.map((v,i)=>pt(v,i).join(',')).join(' ');
const grid=f=>DIMS.map((_,i)=>pt(100*f,i).join(',')).join(' ');
let h='';
[.25,.5,.75,1].forEach(f=>h+='<polygon points="'+grid(f)+'" fill="none" stroke="rgba(196,92,106,.12)" stroke-width="1"/>');
DIMS.forEach((_,i)=>{const[x,y]=pt(100,i);h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="rgba(196,92,106,.1)" stroke-width="1"/>'});
h+='<polygon points="'+poly(sB)+'" fill="rgba(139,110,200,.15)" stroke="#8b6ec8" stroke-width="2" stroke-linejoin="round"/>';
h+='<polygon points="'+poly(sA)+'" fill="rgba(196,92,106,.18)" stroke="#c45c6a" stroke-width="2" stroke-linejoin="round"/>';
DIMS.forEach((d,i)=>{const a=ang(i),ld=r*1.3;h+='<text x="'+(cx+ld*Math.cos(a))+'" y="'+(cy+ld*Math.sin(a))+'" text-anchor="middle" dominant-baseline="middle" style="font-size:9.5px;fill:#7a5252;font-family:\'Noto Serif SC\',serif">'+d+'</text>'});
sA.forEach((s,i)=>{const[x,y]=pt(s,i);h+='<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="#c45c6a"/>'});
sB.forEach((s,i)=>{const[x,y]=pt(s,i);h+='<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="#8b6ec8"/>'});
svg.innerHTML=h;
}

function unlockInsight(){
alert('跳转到支付页面...\n\n这里接入你的支付系统（微信支付/支付宝）');
// 实际使用时替换为：
// window.location.href = '支付链接?code='+C;
}

window.onload=()=>{const c=new URLSearchParams(location.search).get('code');if(c)document.getElementById('ci').value=c.toUpperCase()};
</script>
