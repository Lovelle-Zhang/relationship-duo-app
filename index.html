<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系显影剂 · 双人版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#c45c6a;--coral:#e8806e;--purple:#8b6ec8;--ink-dark:#2e1f1f;--ink-mid:#7a5252;--ink-faint:#b8938a}
body{font-family:'Noto Serif SC',serif;min-height:100vh;background:linear-gradient(160deg,#fef8f3 0%,#fdf0ec 50%,#fef5f0 100%);display:flex;align-items:center;justify-content:center;padding:28px 20px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;width:340px;height:280px;top:-60px;right:-80px;border-radius:60% 40% 70% 30%/50% 60% 40% 50%;background:radial-gradient(ellipse,rgba(248,180,170,.18) 0%,transparent 65%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;width:220px;height:180px;bottom:30px;left:-50px;border-radius:60% 40% 70% 30%/50% 60% 40% 50%;background:radial-gradient(ellipse,rgba(139,110,200,.08) 0%,transparent 65%);pointer-events:none;z-index:0}
.wrap{width:100%;max-width:440px;position:relative;z-index:1}
.screen{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.1)}30%{transform:scale(1)}45%{transform:scale(1.05)}}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes optIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.flower-wrap{width:80px;height:80px;margin:0 auto 20px;position:relative;display:flex;align-items:center;justify-content:center}
.flower-glow{position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(232,128,110,.2) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite}
.flower-emoji{font-size:52px;display:block;animation:floatBob 4s ease-in-out infinite;position:relative;z-index:1}
.eyebrow{font-size:.75rem;letter-spacing:.18em;color:var(--ink-faint);text-align:center;margin-bottom:10px;font-weight:300}
.title{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:400;color:var(--ink-dark);text-align:center;line-height:1.22;margin-bottom:16px}
.intro{font-size:.92rem;color:var(--ink-mid);text-align:center;line-height:2;font-weight:300;margin-bottom:24px}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(196,92,106,.2),transparent)}
.div-dot{font-size:.65rem;color:var(--rose);opacity:.5}
.btn-main{display:block;width:100%;padding:16px 0;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;border-radius:14px;color:#fff;font-family:'Noto Serif SC',serif;font-size:1rem;font-weight:600;letter-spacing:.12em;cursor:pointer;box-shadow:0 8px 28px rgba(196,92,106,.28);margin-bottom:16px;transition:all .2s}
.btn-main:hover{filter:brightness(1.05);transform:translateY(-1px)}
.hint{font-size:.72rem;color:var(--ink-faint);text-align:center;letter-spacing:.06em}
.or-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.or-line{flex:1;height:1px;background:rgba(196,92,106,.12)}
.or-txt{font-size:.75rem;color:var(--ink-faint);flex-shrink:0}
.join-row{display:flex;gap:8px;margin-bottom:6px}
.code-input{flex:1;padding:12px 14px;background:rgba(255,255,255,.7);border:1.5px solid rgba(196,92,106,.18);border-radius:12px;font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--ink-dark);outline:none;letter-spacing:.18em;text-transform:uppercase}
.code-input:focus{border-color:rgba(196,92,106,.4)}
.btn-join{padding:12px 20px;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;border-radius:12px;color:#fff;font-family:'Noto Serif SC',serif;font-size:.9rem;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .2s}
.error-txt{font-size:.78rem;color:var(--rose);margin-bottom:8px;text-align:center;min-height:20px}
.role-tag{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:.75rem;color:var(--ink-faint);letter-spacing:.08em}
.role-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.progress-track{flex:1;height:3px;background:rgba(196,92,106,.12);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(232,128,110,.7),var(--rose));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-num{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--ink-faint);flex-shrink:0}
.q-box{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(196,92,106,.1)}
.q-label{font-size:.68rem;letter-spacing:.22em;color:var(--rose);opacity:.6;margin-bottom:10px;font-family:'Playfair Display',serif}
.q-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;color:var(--ink-dark);line-height:1.5;margin-bottom:6px}
.q-sub{font-size:.78rem;color:var(--ink-faint);font-weight:300}
.slider-wrap{padding:8px 0 28px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;outline:none;cursor:pointer;margin-bottom:16px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--rose));box-shadow:0 2px 8px rgba(196,92,106,.4);cursor:pointer}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--rose));border:none;cursor:pointer}
.slider-val{text-align:center}
.slider-num{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:600;color:var(--rose)}
.slider-num.purple{color:var(--purple)}
.slider-unit{font-size:1rem;color:var(--ink-mid);font-weight:300}
.opt-list{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.opt{display:flex;align-items:center;gap:13px;padding:13px 16px;background:rgba(255,255,255,.7);border:1.5px solid rgba(196,92,106,.12);border-radius:12px;cursor:pointer;text-align:left;font-family:'Noto Serif SC',serif;animation:optIn .35s ease both;width:100%;transition:all .2s}
.opt:hover{border-color:rgba(196,92,106,.3)}
.opt.active-rose{background:rgba(252,236,234,.95);border-color:rgba(196,92,106,.4)}
.opt.active-purple{background:rgba(240,235,252,.95);border-color:rgba(139,110,200,.4)}
.opt-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(196,92,106,.3);flex-shrink:0;transition:all .2s}
.opt.active-rose .opt-radio{background:var(--rose);border-color:var(--rose);box-shadow:0 0 0 3px rgba(196,92,106,.15)}
.opt.active-purple .opt-radio{background:var(--purple);border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,110,200,.15)}
.opt-txt{font-size:.88rem;color:var(--ink-mid);font-weight:300;flex:1;line-height:1.5}
.opt.active-rose .opt-txt{color:#b84d5a}
.opt.active-purple .opt-txt{color:#6a4ea0}
.nav-row{display:flex;gap:10px;margin-top:24px}
.btn-back{padding:12px 18px;background:transparent;border:1.5px solid rgba(196,92,106,.2);border-radius:12px;color:var(--ink-faint);font-family:'Noto Serif SC',serif;font-size:.85rem;cursor:pointer;transition:all .2s}
.btn-next{flex:1;padding:14px 0;border:none;border-radius:12px;color:#fff;font-family:'Noto Serif SC',serif;font-size:.95rem;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(196,92,106,.25);transition:all .2s}
.btn-next:disabled{opacity:.6;cursor:not-allowed}
.btn-next.rose{background:linear-gradient(135deg,var(--coral),var(--rose))}
.btn-next.purple{background:linear-gradient(135deg,#a07ed0,var(--purple))}
.ml-auto{margin-left:auto}
.wait-emoji{font-size:52px;text-align:center;margin-bottom:20px;animation:floatBob 3s ease-in-out infinite}
.code-card{background:linear-gradient(145deg,#fce8e4,#fdeee4);border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:24px;box-shadow:0 8px 28px rgba(196,92,106,.1)}
.code-label{font-size:.75rem;letter-spacing:.15em;color:var(--ink-faint);margin-bottom:12px}
.code-big{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:600;color:var(--rose);letter-spacing:.25em;margin-bottom:10px}
.code-share{display:flex;gap:8px;margin-top:16px}
.btn-copy{flex:1;padding:11px 0;background:rgba(196,92,106,.1);border:1px solid rgba(196,92,106,.2);border-radius:10px;color:var(--rose);font-family:'Noto Serif SC',serif;font-size:.85rem;cursor:pointer;transition:all .2s}
.btn-copy:hover{background:rgba(196,92,106,.18)}
.code-hint{font-size:.78rem;color:var(--ink-faint);margin-top:12px}
.waiting-dots{display:flex;justify-content:center;gap:6px;margin-top:24px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--rose);animation:blink 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.3s}
.dot:nth-child(3){animation-delay:.6s}
.wait-note{font-size:.78rem;color:var(--ink-faint);text-align:center;margin-top:8px}
.score-card{background:linear-gradient(145deg,#fce8e4,#fdeee4,#fdf5e8);border-radius:20px;padding:24px 24px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(196,92,106,.1)}
.score-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,128,110,.15) 0%,transparent 60%);pointer-events:none}
.score-sub{font-size:.75rem;letter-spacing:.15em;color:var(--ink-faint);margin-bottom:8px;position:relative;z-index:1}
.score-num{font-family:'Playfair Display',serif;font-size:5rem;font-weight:600;color:var(--rose);line-height:1;position:relative;z-index:1;animation:heartbeat 2.5s ease-in-out infinite}
.score-denom{font-size:1rem;color:var(--ink-faint);margin-bottom:14px;position:relative;z-index:1}
.score-badge{display:inline-block;background:rgba(196,92,106,.1);border:1px solid rgba(196,92,106,.2);border-radius:99px;padding:5px 16px;font-size:.8rem;color:var(--rose);position:relative;z-index:1}
.tabs{display:flex;gap:6px;margin-bottom:16px;background:rgba(196,92,106,.06);border-radius:12px;padding:4px}
.tab{flex:1;padding:9px 0;background:transparent;border:none;border-radius:10px;color:var(--ink-faint);font-family:'Noto Serif SC',serif;font-size:.8rem;cursor:pointer;transition:all .2s}
.tab.active{background:white;color:var(--rose);font-weight:600;box-shadow:0 2px 8px rgba(196,92,106,.1)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.legend-row{display:flex;justify-content:center;gap:20px;margin-bottom:14px}
.legend-a{font-size:.78rem;color:var(--rose)}
.legend-b{font-size:.78rem;color:var(--purple)}
.profile-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.profile-card{flex:1;background:rgba(255,255,255,.7);border-radius:14px;padding:14px 12px;text-align:center;border:1px solid rgba(196,92,106,.1)}
.profile-divider{font-size:.8rem;color:var(--ink-faint);font-weight:600;flex-shrink:0}
.profile-level{font-size:.75rem;letter-spacing:.1em;font-weight:600;margin-top:6px;margin-bottom:2px}
.profile-score{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:var(--ink-mid)}
.compare-card{background:rgba(255,255,255,.7);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(196,92,106,.08)}
.compare-card.good{border-color:rgba(80,180,100,.25);background:rgba(240,255,240,.6)}
.compare-card.warn{border-color:rgba(230,140,60,.25);background:rgba(255,248,235,.6)}
.compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.compare-dim{font-size:.82rem;color:var(--ink-dark)}
.tag-green{font-size:.7rem;background:rgba(80,180,100,.12);color:#2e8040;border-radius:99px;padding:2px 10px;border:1px solid rgba(80,180,100,.2)}
.tag-orange{font-size:.7rem;background:rgba(230,140,60,.12);color:#b06010;border-radius:99px;padding:2px 10px;border:1px solid rgba(230,140,60,.2)}
.compare-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.compare-bar-track{flex:1;height:6px;background:rgba(196,92,106,.08);border-radius:99px;overflow:hidden}
.compare-bar-fill{height:100%;border-radius:99px;transition:width .6s ease}
.compare-score{font-size:.75rem;font-weight:600;min-width:28px;text-align:right}
.diff-text{font-size:.7rem;color:var(--ink-faint);text-align:right;margin-top:2px}
.insight-block{background:rgba(255,255,255,.7);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid rgba(196,92,106,.08)}
.insight-title{font-size:.9rem;font-weight:600;color:var(--ink-dark);margin-bottom:6px}
.insight-sub{font-size:.82rem;color:var(--ink-mid);font-weight:300;line-height:1.7;margin-bottom:10px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-green-big{background:rgba(80,180,100,.1);color:#2e8040;border-radius:99px;padding:5px 14px;font-size:.8rem;border:1px solid rgba(80,180,100,.2)}
.blind-card{background:rgba(255,248,235,.8);border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(230,140,60,.2)}
.blind-header{display:flex;justify-content:space-between;margin-bottom:4px}
.blind-dim{font-size:.82rem;font-weight:600;color:var(--ink-dark)}
.blind-diff{font-size:.75rem;color:#b06010}
.blind-tip{font-size:.8rem;color:var(--ink-mid);font-weight:300;line-height:1.7}
.final-card{background:linear-gradient(145deg,#fce8e4,#fdeee4);border-radius:16px;padding:20px;margin-top:4px}
.final-title{font-size:.75rem;letter-spacing:.15em;color:var(--ink-faint);margin-bottom:12px;text-align:center}
.final-duration{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;text-align:center;margin-bottom:8px}
.final-analysis{font-size:.86rem;color:var(--ink-mid);line-height:1.9;font-weight:300;margin-bottom:12px}
.advice-box{background:rgba(255,255,255,.5);border-radius:10px;padding:12px 14px;border-left:3px solid rgba(200,150,74,.5)}
.advice-text{font-size:.84rem;color:#7a5a3a;line-height:1.8;font-weight:300}
.share-hint{text-align:center;font-size:.8rem;color:var(--ink-faint);margin:16px 0 10px;font-style:italic}
.btn-ghost{display:block;width:100%;padding:13px 0;background:transparent;border:1.5px solid rgba(196,92,106,.22);border-radius:12px;color:var(--rose);font-family:'Noto Serif SC',serif;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:rgba(196,92,106,.05)}
</style>
</head>
<body>
<div class="wrap">

  <!-- INTRO -->
  <div id="intro" class="screen">
    <div class="flower-wrap"><div class="flower-glow"></div><span class="flower-emoji">🌸</span></div>
    <p class="eyebrow">关系显影剂 · 双人版</p>
    <h1 class="title">你们的关系<br>有多深？</h1>
    <p class="intro">不是一个人的自我认知，<br>而是两个人的关系显影。</p>
    <div class="divider"><div class="div-line"></div><span class="div-dot">✦</span><div class="div-line"></div></div>
    <button class="btn-main" onclick="startAsA()">我来发起测试</button>
    <div class="or-row"><div class="or-line"></div><span class="or-txt">或者</span><div class="or-line"></div></div>
    <div class="join-row">
      <input class="code-input" id="code-input" placeholder="输入邀请码" maxlength="6"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinAsB()">
      <button class="btn-join" id="btn-join" onclick="joinAsB()">进入 →</button>
    </div>
    <p class="error-txt" id="error-txt"></p>
    <p class="hint" style="margin-top:12px">基于关系心理学 · 7 题 · 双人对比报告</p>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen hidden">
    <div class="role-tag"><span class="role-dot" id="role-dot"></span><span id="role-label"></span></div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-num" id="progress-num">1<span>/7</span></span>
    </div>
    <div class="q-box">
      <p class="q-label" id="q-label">Q 01</p>
      <p class="q-text" id="q-text"></p>
      <p class="q-sub" id="q-sub"></p>
    </div>
    <div id="slider-area" class="slider-wrap hidden">
      <input type="range" id="slider" min="0" max="100" step="1" value="0" oninput="onSlider(this.value)">
      <div class="slider-val"><span class="slider-num" id="slider-num">0</span><span class="slider-unit" id="slider-unit"></span></div>
    </div>
    <div id="choice-area" class="opt-list hidden"></div>
    <div class="nav-row">
      <button class="btn-back hidden" id="btn-back" onclick="goBack()">← 上一题</button>
      <button class="btn-next rose ml-auto" id="btn-next" onclick="goNext()">下一题 →</button>
    </div>
  </div>

  <!-- WAITING -->
  <div id="waiting" class="screen hidden" style="text-align:center">
    <div class="wait-emoji">⏳</div>
    <p class="eyebrow">等待另一半</p>
    <h2 class="title" style="font-size:1.8rem">你已完成测试</h2>
    <p class="intro" style="margin-bottom:20px">把邀请码发给另一半<br>TA 完成后报告自动解锁</p>
    <div class="code-card">
      <p class="code-label">邀请码</p>
      <div class="code-big" id="display-code"></div>
      <div class="code-share">
        <button class="btn-copy" onclick="copyCode()">📋 复制邀请码</button>
        <button class="btn-copy" onclick="shareLink()">🔗 复制链接</button>
      </div>
      <p class="code-hint">让另一半在首页输入此码，或直接打开链接</p>
    </div>
    <div class="waiting-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <p class="wait-note">每 3 秒自动检测，完成后自动跳转</p>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen hidden">
    <div class="score-card">
      <div class="score-glow"></div>
      <p class="score-sub">关系契合度</p>
      <div class="score-num" id="r-score">0</div>
      <div class="score-denom">/100</div>
      <div class="score-badge" id="r-badge">超越了 0% 的情侣</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('radar')">雷达图</button>
      <button class="tab" onclick="switchTab('compare')">逐题对比</button>
      <button class="tab" onclick="switchTab('insight')">关系洞察</button>
    </div>
    <div id="tab-radar" class="tab-panel active">
      <div style="display:flex;justify-content:center;margin-bottom:16px">
        <svg id="radar-svg" width="240" height="240" style="overflow:visible"></svg>
      </div>
      <div class="legend-row"><span class="legend-a">── 发起方（玫瑰）</span><span class="legend-b">── 受邀方（蓝紫）</span></div>
      <div class="profile-row">
        <div class="profile-card"><span id="pa-emoji" style="font-size:28px"></span><p class="profile-level" id="pa-level"></p><p class="profile-score" id="pa-score"></p></div>
        <div class="profile-divider">VS</div>
        <div class="profile-card"><span id="pb-emoji" style="font-size:28px"></span><p class="profile-level" id="pb-level" style="color:var(--purple)"></p><p class="profile-score" id="pb-score"></p></div>
      </div>
    </div>
    <div id="tab-compare" class="tab-panel"></div>
    <div id="tab-insight" class="tab-panel"></div>
    <p class="share-hint">📸 截图分享你们的关系报告？</p>
    <button class="btn-ghost" onclick="restart()">重新测试 ↺</button>
  </div>

</div>
<script>
// ══════════════════════════════════════════
// !! 只需修改这两行 !!
const SUPABASE_URL = 'https://esfuazchkbbtccxtamwp.supabase.co';

// ══════════════════════════════════════════

const DIMS=["深度沟通","修复能力","共同体验","价值契合","情绪支持","爱意表达","整体满意"];
const questions=[
  {type:"slider",text:"你们每天深度聊天多久？",sub:"感受、想法、梦想——不是聊琐事",min:0,max:120,step:5,unit:"分钟",def:0,score:v=>Math.round(v/120*100)},
  {type:"choice",text:"吵架后通常多久和好？",options:[{text:"当天就好",score:100},{text:"1–2 天",score:72},{text:"3–7 天",score:40},{text:"超过一周",score:8}]},
  {type:"slider",text:"过去一个月一起做了几次新鲜事？",sub:"去没去过的地方、尝试新活动……",min:0,max:20,step:1,unit:"次",def:0,score:v=>Math.round(v/20*100)},
  {type:"slider",text:"核心话题上观点有多一致？",sub:"金钱观、生活方式、未来规划",min:0,max:100,step:5,unit:"%",def:0,score:v=>v},
  {type:"choice",text:"遇到困难时，对方会：",options:[{text:"第一时间安慰支持我",score:100},{text:"会听但未必能帮",score:68},{text:"有时听有时忽略",score:32},{text:"很少关注我情绪",score:8}]},
  {type:"choice",text:"上次认真表达爱意或感谢是多久前？",options:[{text:"今天或昨天",score:100},{text:"这周以内",score:72},{text:"这个月以内",score:40},{text:"记不清了",score:8}]},
  {type:"slider",text:"你对这段关系的满意度？",sub:"直觉打分，不用想太多",min:0,max:100,step:1,unit:"%",def:0,score:v=>v},
];
const PROFILES=[
  {min:88,level:"灵魂伴侣",emoji:"💍",color:"#c45c6a",duration:"一辈子 ♾️",analysis:"在最关键的每一个维度，你们都做到了。这不靠运气，靠的是两个人持续用心的选择。",advice:"偶尔停下来，认真告诉对方：有你在，我觉得很幸运。"},
  {min:73,level:"深度伴侣",emoji:"🌸",color:"#c45c6a",duration:"20–40 年",analysis:"扎实的情感基础，沟通质量和相互支持都处于很好的水准。偶尔的摩擦是关系有活力的证明。",advice:"定期问对方：最近有什么想说但还没说的？"},
  {min:55,level:"稳定伴侣",emoji:"🌻",color:"#d4844a",duration:"10–20 年",analysis:"稳定基础不错，但新鲜感、深度对话、情感表达都可以再多一点。",advice:"这个月约一次「假装第一次约会」。"},
  {min:38,level:"磨合中",emoji:"🌤️",color:"#b07830",duration:"5–10 年",analysis:"核心议题还有明显提升空间。现在投入，收益很大。",advice:"选一个一直回避的话题，这周聊一次。"},
  {min:0,level:"需要重建",emoji:"🌱",color:"#8a6a3a",duration:"需要努力",analysis:"距离大于连结，多个维度都在发出需要关注的信号。",advice:"今天就做一件小事：告诉对方你欣赏 TA 的一点。"},
];
const TIPS={"深度沟通":"试试每周定一个「无手机聊天时间」，哪怕只有 15 分钟。","修复能力":"下次争吵后，先说「我感到……」而不是「你总是……」。","共同体验":"这个月一起做一件从没做过的事，不用多大，重要的是一起。","价值契合":"找一个安静的晚上，各自写下「五年后理想生活」，然后互相分享。","情绪支持":"试着在对方低落时，先问「你现在需要倾听还是建议？」","爱意表达":"今天就做一件小事：认真告诉对方你欣赏 TA 的一点。","整体满意":"坐下来聊聊：你觉得这段关系里，我们最需要改善什么？"};

function getProfile(s){return PROFILES.find(p=>s>=p.min)||PROFILES[PROFILES.length-1]}
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function calcScores(ans){return questions.map((q,i)=>{const a=ans[i];if(a==null)return 0;return q.type==="slider"?q.score(a):a})}
function avg(arr){return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length)}

// Supabase REST helpers
const SB_HEADERS={
  'Content-Type':'application/json',
  'apikey':SUPABASE_KEY,
  'Authorization':'Bearer '+SUPABASE_KEY,
};
async function sbGet(code,role){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/pairs?code=eq.${code}&role=eq.${role}&select=scores&limit=1`,{headers:SB_HEADERS});
  const d=await r.json();
  if(!Array.isArray(d)||d.length===0)return null;
  return d[0].scores;
}
async function sbPost(code,role,scores){
  await fetch(`${SUPABASE_URL}/rest/v1/pairs`,{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({code,role,scores}),
  });
}

let role=null,code="",currentQ=0,answers=[],sliderCurrent=0,pollTimer=null,myScores=null,partnerScores=null;

function showScreen(id){["intro","quiz","waiting","result"].forEach(s=>document.getElementById(s).classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}
function showError(msg){const el=document.getElementById("error-txt");el.textContent=msg;setTimeout(()=>el.textContent="",3000)}

function startAsA(){
  role="A";code=genCode();answers=new Array(questions.length).fill(null);currentQ=0;sliderCurrent=0;
  document.getElementById("role-dot").style.background="#c45c6a";
  document.getElementById("role-label").textContent="发起方 · 玫瑰色";
  document.getElementById("btn-next").className="btn-next rose ml-auto";
  showScreen("quiz");renderQuestion();
}

async function joinAsB(){
  const c=document.getElementById("code-input").value.trim().toUpperCase();
  if(c.length<6){showError("请输入完整的 6 位邀请码");return}
  const btn=document.getElementById("btn-join");btn.textContent="检查中…";btn.disabled=true;
  try{
    const scores=await sbGet(c,"A");
    if(!scores){showError("找不到这个邀请码，请确认后重试");btn.textContent="进入 →";btn.disabled=false;return}
    role="B";code=c;answers=new Array(questions.length).fill(null);currentQ=0;sliderCurrent=0;
    document.getElementById("role-dot").style.background="#8b6ec8";
    document.getElementById("role-label").textContent="受邀方 · 蓝紫色";
    document.getElementById("btn-next").className="btn-next purple ml-auto";
    showScreen("quiz");renderQuestion();
  }catch(e){showError("网络错误，请重试");}
  btn.textContent="进入 →";btn.disabled=false;
}

function renderQuestion(){
  const q=questions[currentQ];
  const pct=Math.round(currentQ/questions.length*100);
  document.getElementById("progress-fill").style.width=pct+"%";
  document.getElementById("progress-num").innerHTML=(currentQ+1)+'<span>/'+questions.length+'</span>';
  document.getElementById("q-label").textContent="Q "+String(currentQ+1).padStart(2,"0");
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("q-sub").textContent=q.sub||"";
  const isLast=currentQ===questions.length-1;
  document.getElementById("btn-back").classList.toggle("hidden",currentQ===0);
  const btnNext=document.getElementById("btn-next");
  btnNext.classList.toggle("ml-auto",currentQ===0);
  btnNext.textContent=isLast?"完成 →":"下一题 →";
  if(q.type==="slider"){
    document.getElementById("slider-area").classList.remove("hidden");
    document.getElementById("choice-area").classList.add("hidden");
    const s=document.getElementById("slider");
    s.min=q.min;s.max=q.max;s.step=q.step;
    const val=answers[currentQ]!=null?answers[currentQ]:q.def;
    s.value=sliderCurrent=val;
    document.getElementById("slider-num").textContent=val;
    document.getElementById("slider-num").className="slider-num"+(role==="B"?" purple":"");
    document.getElementById("slider-unit").textContent=" "+q.unit;
    updateSliderTrack(val,q.min,q.max);
  }else{
    document.getElementById("slider-area").classList.add("hidden");
    document.getElementById("choice-area").classList.remove("hidden");
    const area=document.getElementById("choice-area");area.innerHTML="";
    const cls=role==="B"?"active-purple":"active-rose";
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");
      btn.className="opt"+(answers[currentQ]===opt.score?" "+cls:"");
      btn.style.animationDelay=(i*.06)+"s";
      btn.innerHTML='<span class="opt-radio"></span><span class="opt-txt">'+opt.text+'</span>';
      btn.onclick=()=>{answers[currentQ]=opt.score;area.querySelectorAll(".opt").forEach(b=>b.classList.remove("active-rose","active-purple"));btn.classList.add(cls)};
      area.appendChild(btn);
    });
  }
}

function onSlider(val){sliderCurrent=Number(val);document.getElementById("slider-num").textContent=val;updateSliderTrack(val,questions[currentQ].min,questions[currentQ].max)}
function updateSliderTrack(val,min,max){const pct=((val-min)/(max-min))*100;const color=role==="B"?"#8b6ec8":"#c45c6a";document.getElementById("slider").style.background=`linear-gradient(to right,${color} ${pct}%,rgba(196,92,106,.15) ${pct}%)`}

async function goNext(){
  const q=questions[currentQ];
  const na=[...answers];
  if(q.type==="slider")na[currentQ]=sliderCurrent;
  else if(na[currentQ]==null)return;
  answers=na;
  if(currentQ===questions.length-1){
    myScores=calcScores(na);
    const btn=document.getElementById("btn-next");btn.disabled=true;btn.textContent="提交中…";
    try{
      await sbPost(code,role,myScores);
      if(role==="A"){
        document.getElementById("display-code").textContent=code;
        showScreen("waiting");
        const pollCode=code;const pollScores=myScores;
        pollTimer=setInterval(async()=>{
          try{
            const s=await sbGet(pollCode,"B");
            if(s){
              clearInterval(pollTimer);
              partnerScores=s;
              myScores=pollScores;
              role="A";
              renderResult();
            }
          }catch(e){console.log('poll error',e)}
        },3000);
      }else{
        const s=await sbGet(code,"A");
        partnerScores=s;renderResult();
      }
    }catch(e){showError("提交失败，请重试");btn.disabled=false;btn.textContent="完成 →"}
  }else{
    currentQ++;sliderCurrent=questions[currentQ].def||0;renderQuestion();
  }
}

function goBack(){if(currentQ>0){currentQ--;sliderCurrent=answers[currentQ]??questions[currentQ].def??0;renderQuestion()}}
function copyCode(){navigator.clipboard.writeText(code).then(()=>alert("邀请码已复制："+code))}
function shareLink(){const url=location.origin+location.pathname+"?code="+code;navigator.clipboard.writeText(url).then(()=>alert("链接已复制！"))}

function renderResult(){
  const sA=role==="A"?myScores:partnerScores;
  const sB=role==="A"?partnerScores:myScores;
  const tA=avg(sA),tB=avg(sB);
  const combined=avg(sA.map((a,i)=>Math.round((a+sB[i])/2)));
  const pct=Math.min(99,Math.round(combined*.91+Math.sin(combined)*3));
  const pA=getProfile(tA),pB=getProfile(tB),pC=getProfile(combined);
  let n=0;const el=document.getElementById("r-score");
  const t=setInterval(()=>{n=Math.min(combined,n+Math.ceil(combined/30));el.textContent=n;if(n>=combined)clearInterval(t)},40);
  document.getElementById("r-badge").textContent="超越了 "+pct+"% 的情侣";
  document.getElementById("pa-emoji").textContent=pA.emoji;document.getElementById("pa-level").textContent=pA.level;document.getElementById("pa-level").style.color=pA.color;document.getElementById("pa-score").textContent=tA+"分";
  document.getElementById("pb-emoji").textContent=pB.emoji;document.getElementById("pb-level").textContent=pB.level;document.getElementById("pb-score").textContent=tB+"分";
  drawRadar(sA,sB,240);
  const compare=document.getElementById("tab-compare");compare.innerHTML="";
  DIMS.forEach((dim,i)=>{
    const a=sA[i],b=sB[i],diff=Math.abs(a-b);const isG=diff<=20,isW=diff>35;
    const card=document.createElement("div");card.className="compare-card"+(isG?" good":isW?" warn":"");
    card.innerHTML=`<div class="compare-header"><span class="compare-dim">${dim}</span>${isG?'<span class="tag-green">共识 ✓</span>':isW?'<span class="tag-orange">差异 !</span>':""}</div><div class="compare-bar"><div class="compare-bar-track"><div class="compare-bar-fill" style="width:${a}%;background:#c45c6a"></div></div><span class="compare-score" style="color:#c45c6a">${a}</span></div><div class="compare-bar"><div class="compare-bar-track"><div class="compare-bar-fill" style="width:${b}%;background:#8b6ec8"></div></div><span class="compare-score" style="color:#8b6ec8">${b}</span></div>${diff>0?`<p class="diff-text">差值 ${diff} 分</p>`:""}`;
    compare.appendChild(card);
  });
  const insight=document.getElementById("tab-insight");
  const diffs=DIMS.map((d,i)=>({dim:d,a:sA[i],b:sB[i],diff:Math.abs(sA[i]-sB[i])}));
  const consensus=diffs.filter(x=>x.diff<=20),blind=diffs.filter(x=>x.diff>35).sort((a,b)=>b.diff-a.diff);
  const surprise=[...diffs].sort((a,b)=>Math.abs(b.b-b.a)-Math.abs(a.b-a.a))[0];
  let html="";
  if(consensus.length)html+=`<div class="insight-block"><p class="insight-title">✅ 共识区</p><p class="insight-sub">你们在以下维度高度一致，是关系的稳固基石</p><div class="tag-cloud">${consensus.map(x=>`<span class="tag-green-big">${x.dim}</span>`).join("")}</div></div>`;
  if(blind.length)html+=`<div class="insight-block"><p class="insight-title">⚠️ 盲区</p><p class="insight-sub">这些维度差异明显，值得坐下来好好聊</p>${blind.slice(0,3).map(x=>`<div class="blind-card"><div class="blind-header"><span class="blind-dim">${x.dim}</span><span class="blind-diff">差 ${x.diff} 分</span></div><p class="blind-tip">${TIPS[x.dim]||""}</p></div>`).join("")}</div>`;
  if(surprise&&Math.abs(surprise.b-surprise.a)>20)html+=`<div class="insight-block"><p class="insight-title">💡 惊喜发现</p><p class="insight-sub">在「${surprise.dim}」上，${surprise.b>surprise.a?"受邀方":"发起方"}的投入比对方预想的高出 ${Math.abs(surprise.b-surprise.a)} 分。</p></div>`;
  html+=`<div class="final-card"><p class="final-title">你们的婚姻预测</p><div class="divider"><div class="div-line"></div><span class="div-dot">✦</span><div class="div-line"></div></div><p class="final-duration" style="color:${pC.color}">${pC.duration}</p><p class="final-analysis">${pC.analysis}</p><div class="advice-box"><p class="advice-text">✨ ${pC.advice}</p></div></div>`;
  insight.innerHTML=html;
  showScreen("result");
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["radar","compare","insight"][i]===name));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
}

function drawRadar(sA,sB,size){
  const svg=document.getElementById("radar-svg");svg.setAttribute("width",size);svg.setAttribute("height",size);
  const cx=size/2,cy=size/2,r=size*.36,n=DIMS.length;
  const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
  const pt=(s,i)=>{const a=ang(i),d=r*s/100;return[cx+d*Math.cos(a),cy+d*Math.sin(a)]};
  const ptsOf=s=>s.map((v,i)=>pt(v,i).join(",")).join(" ");
  const grid=f=>DIMS.map((_,i)=>pt(100*f,i).join(",")).join(" ");
  let html="";
  [.25,.5,.75,1].forEach(f=>html+=`<polygon points="${grid(f)}" fill="none" stroke="rgba(196,92,106,.12)" stroke-width="1"/>`);
  DIMS.forEach((_,i)=>{const[x,y]=pt(100,i);html+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(196,92,106,.1)" stroke-width="1"/>`});
  html+=`<polygon points="${ptsOf(sB)}" fill="rgba(139,110,200,.15)" stroke="#8b6ec8" stroke-width="2" stroke-linejoin="round"/>`;
  html+=`<polygon points="${ptsOf(sA)}" fill="rgba(196,92,106,.18)" stroke="#c45c6a" stroke-width="2" stroke-linejoin="round"/>`;
  DIMS.forEach((d,i)=>{const a=ang(i),ld=r*1.3;const lx=cx+ld*Math.cos(a),ly=cy+ld*Math.sin(a);html+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" style="font-size:9.5px;fill:#7a5252;font-family:'Noto Serif SC',serif">${d}</text>`});
  sA.forEach((s,i)=>{const[x,y]=pt(s,i);html+=`<circle cx="${x}" cy="${y}" r="3.5" fill="#c45c6a"/>`});
  sB.forEach((s,i)=>{const[x,y]=pt(s,i);html+=`<circle cx="${x}" cy="${y}" r="3.5" fill="#8b6ec8"/>`});
  svg.innerHTML=html;
}

function restart(){
  if(pollTimer)clearInterval(pollTimer);
  role=null;code="";currentQ=0;answers=[];myScores=null;partnerScores=null;
  document.getElementById("code-input").value="";
  switchTab("radar");showScreen("intro");
}

window.onload=()=>{const p=new URLSearchParams(location.search);const c=p.get("code");if(c)document.getElementById("code-input").value=c.toUpperCase()};
</script>
