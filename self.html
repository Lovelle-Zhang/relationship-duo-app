<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和自己 · 林</title>
<link rel="icon" href="images/lin-dark-logo.png">
<link rel="apple-touch-icon" href="images/lin-dark-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0a0f18;
  color: rgba(255,255,255,0.75);
  font-family: 'Noto Serif SC', serif;
  overflow-x: hidden;
}

/* 背景渐变 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(40,60,80,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(30,45,65,0.25) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* 顶部导航 */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  z-index: 50;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.nav-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  font-weight: 600;
  letter-spacing: .18em;
  color: rgba(255,255,255,0.32);
  cursor: pointer;
  text-decoration: none;
  transition: color 0.3s;
}
.nav-back:hover { color: rgba(255,255,255,0.78); }
.nav-title {
  font-size: 15px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.5);
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.nav-count {
  font-size: 11px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.18);
}

/* 主内容区 */
.content {
  position: relative;
  z-index: 1;
  padding: 96px 0 80px;
  max-width: 480px;
  margin: 0 auto;
}

/* 空状态 */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
  padding: 0 40px;
  text-align: center;
}
.empty-icon {
  width: 48px;
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin-bottom: 8px;
}
.empty-text {
  font-size: 13px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
  line-height: 2;
}
.empty-link {
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.25);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 2px;
  transition: color 0.2s, border-color 0.2s;
  margin-top: 8px;
  display: inline-block;
}
.empty-link:hover {
  color: rgba(255,255,255,0.5);
  border-color: rgba(255,255,255,0.3);
}

/* 时间轴 */
.timeline {
  padding: 0 28px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.note-item {
  display: flex;
  gap: 20px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: relative;
  animation: fadeIn 0.4s ease both;
  user-select: none;
  -webkit-user-select: none;
  transition: opacity .15s;
  cursor: pointer;
}
.note-item.pressing { opacity: 0.5 !important; background: rgba(200,80,80,.06); border-radius: 8px; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.note-date {
  flex-shrink: 0;
  width: 52px;
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.18);
  padding-top: 3px;
  line-height: 1.6;
}

.note-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.note-card-text {
  font-size: 12px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.22);
  line-height: 1.7;
  font-style: italic;
  padding-left: 10px;
  border-left: 1px solid rgba(255,255,255,0.1);
}

.note-content {
  font-size: 14px;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,0.7);
  line-height: 1.9;
  white-space: pre-wrap;
}

.note-delete {
  position: absolute;
  top: 28px; right: 0;
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: color 0.2s;
  opacity: 0;
}
.note-item:hover .note-delete { opacity: 1; }
.note-delete:hover { color: rgba(255,100,100,0.4); }

/* 手机端SVG背景 */
#mobile-bg{display:none}
@keyframes pageFadeIn{from{opacity:0}to{opacity:1}}
body{animation:pageFadeIn 0.3s ease-out}
@media(max-width:640px){
  body::before{display:none}
  body{background:#0d1a14}
  #mobile-bg{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:#0d1a14}
  #mobile-bg svg{width:100%;height:100%;position:absolute;bottom:0;left:0}
  .nav{background:rgba(13,26,20,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
  .content{padding-top:80px}
  .note-delete{display:none !important}
}
.confirm-mask{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:999;
  display:flex;align-items:center;justify-content:center;
  animation:maskIn .3s ease;
}
@keyframes maskIn{from{opacity:0}to{opacity:1}}
.confirm-box{
  background:linear-gradient(145deg,rgba(30,52,40,.85) 0%,rgba(20,38,28,.95) 100%);
  border:1px solid rgba(90,138,106,.15);
  border-radius:24px;
  padding:36px 28px 28px;
  width:300px;
  max-width:90vw;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:boxIn .4s cubic-bezier(.4,0,.2,1);
}
@keyframes boxIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.confirm-box p{
  text-align:center;
  color:#e8f0e8;
  font-size:17px;
  font-weight:500;
  letter-spacing:1.5px;
  margin-bottom:6px;
}
.confirm-box .confirm-sub{
  text-align:center;
  color:#8a9a8a;
  font-size:13px;
  margin-bottom:28px;
  opacity:.7;
  line-height:1.5;
}
.confirm-btns{display:flex;flex-direction:column;gap:12px}
.confirm-btns button{
  width:100%;padding:16px;
  border-radius:14px;
  font-size:15px;letter-spacing:.5px;
  cursor:pointer;font-family:inherit;
  border:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;
}
.confirm-cancel{
  background:linear-gradient(135deg,rgba(90,138,106,.25) 0%,rgba(61,90,74,.3) 100%);
  border:1.5px solid rgba(90,138,106,.4) !important;
  color:#c8e0d8;
  font-weight:500;
}
.confirm-cancel:hover{background:linear-gradient(135deg,rgba(90,138,106,.35) 0%,rgba(61,90,74,.4) 100%)}
.confirm-cancel:active{transform:scale(.97)}
.confirm-ok{
  background:transparent;
  border:1px solid rgba(138,154,138,.2) !important;
  color:#8a9a8a;
  font-size:14px;
}
.confirm-ok:hover{background:rgba(255,255,255,.03)}
.confirm-ok:active{transform:scale(.97)}
</style>
</head>
<body>
<div id="confirmMask" class="confirm-mask" style="display:none">
  <div class="confirm-box">
    <p>这条记录</p>
    <div class="confirm-sub">将从林中消失</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="confirmResolve(false)">留 下</button>
      <button class="confirm-ok" onclick="confirmResolve(true)">放 手</button>
    </div>
  </div>
</div>

<div id="mobile-bg"><svg viewBox="0 0 390 844" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="ssk" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1a14"/><stop offset="100%" style="stop-color:#1a2d24"/></linearGradient><linearGradient id="st1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#3d5a4a;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#1e3428;stop-opacity:0.5"/></linearGradient><linearGradient id="st2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#4a6a5a;stop-opacity:0.45"/><stop offset="100%" style="stop-color:#2d4a3a;stop-opacity:0.65"/></linearGradient><linearGradient id="st3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#5a8a6a;stop-opacity:0.55"/><stop offset="100%" style="stop-color:#3d5a4a;stop-opacity:0.75"/></linearGradient><linearGradient id="sfog" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1a14;stop-opacity:0"/><stop offset="100%" style="stop-color:#0d1a14;stop-opacity:0.85"/></linearGradient></defs><rect width="390" height="844" fill="url(#ssk)"/><circle cx="80" cy="60" r="1" fill="rgba(232,240,232,0.5)"/><circle cx="200" cy="40" r="1.2" fill="rgba(232,240,232,0.4)"/><circle cx="310" cy="80" r="0.8" fill="rgba(232,240,232,0.6)"/><polygon points="40,844 80,580 120,844" fill="url(#st1)"/><polygon points="160,844 200,560 240,844" fill="url(#st1)"/><polygon points="270,844 310,590 350,844" fill="url(#st1)"/><polygon points="10,844 60,500 110,844" fill="url(#st2)"/><polygon points="140,844 185,480 230,844" fill="url(#st2)"/><polygon points="260,844 310,510 360,844" fill="url(#st2)"/><polygon points="0,844 55,400 110,844" fill="url(#st3)"/><polygon points="130,844 180,380 230,844" fill="url(#st3)"/><polygon points="260,844 315,390 370,844" fill="url(#st3)"/><polygon points="340,844 390,420 440,844" fill="url(#st3)"/><rect x="0" y="680" width="390" height="164" fill="url(#sfog)"/></svg></div>

<nav class="nav">
  <a class="nav-back" href="forest.html">← lin</a>
  <div class="nav-title">和 自 己</div>
  <div class="nav-count" id="noteCount"></div>
</nav>

<div class="content">
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon"></div>
    <div class="empty-text">还没有记录<br>去抽一张牌，写下此刻的感受</div>
    <a class="empty-link" href="card.html">去抽卡 →</a>
  </div>
  <div class="timeline" id="timeline"></div>
</div>

<script>
function loadNotes() {
  const notes = JSON.parse(localStorage.getItem('lin_self_notes') || '[]');
  const timeline = document.getElementById('timeline');
  const emptyState = document.getElementById('emptyState');
  const noteCount = document.getElementById('noteCount');

  if (notes.length === 0) {
    emptyState.style.display = 'flex';
    noteCount.textContent = '';
    return;
  }

  emptyState.style.display = 'none';
  noteCount.textContent = notes.length + ' 条';
  timeline.innerHTML = '';

  notes.forEach((n, i) => {
    const item = document.createElement('div');
    item.className = 'note-item';
    item.style.animationDelay = (i * 0.04) + 's';
    item.innerHTML = `
      <div class="note-date">${n.date || ''}</div>
      <div class="note-body">
        ${n.cardText ? `<div class="note-card-text">${n.cardText}</div>` : ''}
        <div class="note-content">${escapeHtml(n.note)}</div>
      </div>
      <div class="note-delete" title="删除">✕</div>
    `;
    let timer;
    const press=()=>{item.classList.add('pressing');timer=setTimeout(()=>{item.classList.remove('pressing');deleteNote(n.id, item)},700)};
    const cancel=()=>{clearTimeout(timer);item.classList.remove('pressing')};
    item.addEventListener('touchstart',press,{passive:true});
    item.addEventListener('touchend',cancel,{passive:true});
    item.addEventListener('touchmove',cancel,{passive:true});
    item.addEventListener('mousedown',press);
    item.addEventListener('mouseup',cancel);
    item.addEventListener('mouseleave',cancel);
    // 桌面端：hover 显示的删除按钮，点击直接删除
    const delBtn = item.querySelector('.note-delete');
    if (delBtn) {
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        clearTimeout(timer);
        item.classList.remove('pressing');
        deleteNote(n.id, item);
      });
      delBtn.addEventListener('mousedown', (e) => e.stopPropagation());
    }
    timeline.appendChild(item);
  });
}

function deleteNote(id, el) {
  showConfirm().then(ok=>{
    if(!ok)return;
    let notes = JSON.parse(localStorage.getItem('lin_self_notes') || '[]');
    notes = notes.filter(n => n.id !== id);
    localStorage.setItem('lin_self_notes', JSON.stringify(notes));
    el.remove();
    const remaining = document.querySelectorAll('.note-item').length;
    document.getElementById('noteCount').textContent = remaining ? remaining + ' 条' : '';
    if(!remaining) document.getElementById('emptyState').style.display = 'flex';
  });
}

let _confirmResolve=null;
function showConfirm(){return new Promise(r=>{_confirmResolve=r;document.getElementById('confirmMask').style.display='flex'})}
function confirmResolve(v){document.getElementById('confirmMask').style.display='none';if(_confirmResolve){_confirmResolve(v);_confirmResolve=null}}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadNotes();
</script>
</body>
</html>
